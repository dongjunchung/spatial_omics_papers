        <circle cx="370" cy="253" r="6" fill="#5f6caf"/>
        <text x="388" y="258" class="item">Modality-specific likelihood</text><text x="388" y="285" class="item">terms</text>
        <circle cx="370" cy="327" r="6" fill="#5f6caf"/>
        <text x="388" y="332" class="item">Spatial adjacency</text><text x="388" y="359" class="item">construction</text>
        <circle cx="370" cy="401" r="6" fill="#5f6caf"/>
        <text x="388" y="406" class="item">Feature-level quality control</text>
      <path d="M 623 418 H 643" class="arrow"/>
      <rect x="650" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#9c6ade" stroke-width="4"/>
