        <circle cx="62" cy="327" r="6" fill="#3d405b"/>
        <text x="80" y="332" class="item">Spatial coordinates</text>
        <circle cx="62" cy="385" r="6" fill="#3d405b"/>
        <text x="80" y="390" class="item">Cell or spot neighborhood</text><text x="80" y="417" class="item">graph</text>
