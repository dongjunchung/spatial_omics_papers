        <text x="1004" y="258" class="item">Posterior proportional to</text><text x="1004" y="285" class="item">likelihood times spatial</text><text x="1004" y="312" class="item">prior</text>
        <circle cx="986" cy="354" r="6" fill="#f2cc8f"/>
        <text x="1004" y="359" class="item">Infer domain count from data</text>
        <circle cx="986" cy="412" r="6" fill="#f2cc8f"/>
        <text x="1004" y="417" class="item">Preserve local topology</text><text x="1004" y="444" class="item">without smoothing features</text>
      <path d="M 1239 418 H 1259" class="arrow"/>
      <rect x="1266" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#3d405b" stroke-width="4"/>
