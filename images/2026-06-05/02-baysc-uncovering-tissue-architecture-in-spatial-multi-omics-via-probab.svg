        <circle cx="678" cy="253" r="6" fill="#9c6ade"/>
        <text x="696" y="258" class="item">Mixture of Finite Mixtures</text><text x="696" y="285" class="item">prior</text>
        <circle cx="678" cy="327" r="6" fill="#9c6ade"/>
        <text x="696" y="332" class="item">Latent domain assignment z_i</text>
