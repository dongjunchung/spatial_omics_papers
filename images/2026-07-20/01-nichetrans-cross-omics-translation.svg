<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#f7f9fd}.p{fill:#fff;stroke:#cad6e8;stroke-width:2}.sp{fill:#f8fbff;stroke:#d5dfef;stroke-width:1.6}.ti{font:700 30px Arial;fill:#12223d}.su{font:600 17px Arial;fill:#41536d}.h{font:700 20px Arial;fill:#16263f}.t{font:14px Arial;fill:#2b3b50}.sm{font:12px Arial;fill:#52637a}.m{font:15px Consolas;fill:#24344f}.a{stroke:#476fba;stroke-width:3;fill:none;marker-end:url(#ar)}.edge{stroke:#9db6e4;stroke-width:2}.cell{fill:#fff;stroke:#6f91c8;stroke-width:2}.rna{fill:#4f7bd9}.prot{fill:#f28e2b}.met{fill:#59a14f}.lat{fill:#7b68ee}.attn{fill:#d94f70}.out{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#476fba"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="60" y="56" class="ti">NicheTrans: spatial-aware cross-omics translation</text><text x="60" y="86" class="su">Transformer-based multimodal translation conditioned on cellular microenvironment and measured modality</text><rect x="55" y="125" width="405" height="760" rx="24" class="p"/><rect x="495" y="125" width="610" height="760" rx="24" class="p"/><rect x="1140" y="125" width="405" height="760" rx="24" class="p"/><text x="90" y="165" class="h">1. Spatial multimodal context</text><text x="90" y="193" class="su">Measured single modality plus niche neighborhood</text><g transform="translate(100 250)"><path d="M35 90C104 20 270 30 330 128C390 225 294 345 155 330C55 320-20 195 35 90Z" fill="#eef4ff" stroke="#c4d3ea" stroke-width="2"/><circle cx="95" cy="115" r="22" class="cell"/><circle cx="165" cy="95" r="22" class="cell"/><circle cx="240" cy="135" r="22" class="cell"/><circle cx="122" cy="205" r="22" class="cell"/><circle cx="205" cy="215" r="22" class="cell"/><circle cx="268" cy="260" r="22" class="cell"/><line x1="95" y1="115" x2="165" y2="95" class="edge"/><line x1="165" y1="95" x2="240" y2="135" class="edge"/><line x1="122" y1="205" x2="205" y2="215" class="edge"/><line x1="205" y1="215" x2="268" y2="260" class="edge"/><line x1="95" y1="115" x2="122" y2="205" class="edge"/><rect x="45" y="405" width="240" height="92" rx="16" class="sp"/><text x="65" y="438" class="m">input modality: RNA</text><rect x="65" y="460" width="65" height="14" rx="7" class="rna"/><rect x="138" y="460" width="105" height="14" rx="7" class="rna" opacity=".65"/></g><path d="M465 505C478 505 484 505 495 505" class="a"/><text x="530" y="165" class="h">2. Niche-aware Transformer</text><text x="530" y="193" class="su">Cell token, modality token, neighborhood token</text><rect x="535" y="235" width="530" height="255" rx="22" class="sp"/><g transform="translate(570 275)"><rect x="0" y="0" width="135" height="70" rx="14" fill="#eef4ff" stroke="#9db6e4"/><text x="28" y="42" class="m">cell token</text><rect x="190" y="0" width="135" height="70" rx="14" fill="#fff3e2" stroke="#d49a52"/><text x="214" y="42" class="m">omics token</text><rect x="380" y="0" width="135" height="70" rx="14" fill="#eaf7ea" stroke="#8fbd8f"/><text x="392" y="42" class="m">niche token</text><path d="M68 70C110 135 405 135 448 70" class="a"/><rect x="115" y="155" width="300" height="70" rx="18" class="lat"/><text x="190" y="198" class="m" fill="#fff">cross-attention layers</text></g><rect x="535" y="535" width="530" height="250" rx="22" class="sp"/><g transform="translate(570 575)"><text x="0" y="0" class="m">translation objectives</text><rect x="0" y="40" width="155" height="68" rx="14" fill="#eaf7ea" stroke="#8fbd8f"/><text x="35" y="82" class="m">RNA -> protein</text><rect x="185" y="40" width="155" height="68" rx="14" fill="#fff3e2" stroke="#d49a52"/><text x="218" y="82" class="m">RNA -> metabolite</text><rect x="370" y="40" width="155" height="68" rx="14" fill="#eef4ff" stroke="#9db6e4"/><text x="402" y="82" class="m">single -> multi</text><circle cx="105" cy="165" r="23" class="attn"/><circle cx="175" cy="165" r="23" class="prot"/><circle cx="245" cy="165" r="23" class="met"/><circle cx="315" cy="165" r="23" class="rna"/><path d="M105 165C160 95 260 235 315 165" stroke="#d94f70" stroke-width="4" fill="none"/><text x="0" y="220" class="sm">Interpretation uses attention/attribution to link translated markers with gene programs and spatial domains.</text></g><path d="M1110 505C1122 505 1128 505 1140 505" class="a"/><text x="1175" y="165" class="h">3. Outputs</text><text x="1175" y="193" class="su">Translated modalities and spatial insight</text><g transform="translate(1185 250)"><rect x="0" y="0" width="310" height="110" rx="18" class="out"/><text x="25" y="40" class="m">spatial multiomics domains</text><text x="25" y="68" class="sm">domains not visible from one modality alone</text><rect x="0" y="160" width="310" height="110" rx="18" fill="#fff3e2" stroke="#d49a52"/><text x="25" y="200" class="m">translated protein markers</text><text x="25" y="228" class="sm">used as spatial landmarks</text><rect x="0" y="320" width="310" height="130" rx="18" fill="#f7ecff" stroke="#b99bdc"/><text x="25" y="360" class="m">biological findings</text><text x="25" y="388" class="sm">dopamine metabolism programs</text><text x="25" y="412" class="sm">amyloid beta-associated cell states</text></g></svg>
