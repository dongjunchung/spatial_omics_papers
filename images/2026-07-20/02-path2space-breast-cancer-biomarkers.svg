<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#fffdf9}.p{fill:#fff;stroke:#eadfce;stroke-width:2}.sp{fill:#fffaf3;stroke:#eadfce;stroke-width:1.6}.ti{font:700 30px Arial;fill:#332212}.su{font:600 17px Arial;fill:#65513b}.h{font:700 20px Arial;fill:#3b2815}.t{font:14px Arial;fill:#3f3020}.sm{font:12px Arial;fill:#6f604e}.m{font:15px Consolas;fill:#372817}.a{stroke:#b56b21;stroke-width:3;fill:none;marker-end:url(#ar)}.he{fill:#f2d3d8;stroke:#be8792;stroke-width:2}.patch{fill:#f8e2e6;stroke:#be8792;stroke-width:2}.expr{fill:#4f7bd9}.bio{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}.risk{fill:#fff3e2;stroke:#d49a52;stroke-width:2}.mix{fill:#eadcf0;stroke:#bd9bcc;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b56b21"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="60" y="56" class="ti">Path2Space: AI-predicted spatial transcriptomics for breast cancer biomarkers</text><text x="60" y="86" class="su">H&amp;E whole-slide images are mapped to spatial gene-expression fields, then converted into spatial biomarker summaries</text><rect x="55" y="125" width="405" height="760" rx="24" class="p"/><rect x="495" y="125" width="610" height="760" rx="24" class="p"/><rect x="1140" y="125" width="405" height="760" rx="24" class="p"/><text x="90" y="165" class="h">1. Training signal</text><text x="90" y="193" class="su">Breast cancer Visium spots with matched H&amp;E</text><g transform="translate(95 250)"><path d="M35 90C102 20 270 30 332 128C392 225 294 345 155 330C55 320-20 195 35 90Z" class="he"/><rect x="75" y="80" width="55" height="55" rx="8" class="patch"/><rect x="145" y="70" width="55" height="55" rx="8" class="patch"/><rect x="220" y="118" width="55" height="55" rx="8" class="patch"/><rect x="105" y="170" width="55" height="55" rx="8" class="patch"/><rect x="185" y="195" width="55" height="55" rx="8" class="patch"/><circle cx="102" cy="108" r="11" class="expr"/><circle cx="172" cy="98" r="11" class="expr"/><circle cx="248" cy="145" r="11" class="expr"/><circle cx="132" cy="198" r="11" class="expr"/><circle cx="212" cy="222" r="11" class="expr"/></g><rect x="95" y="625" width="315" height="112" rx="16" class="sp"/><text x="118" y="660" class="m">input: WSI patch + coordinates</text><text x="118" y="690" class="m">target: 14,068-gene ST vector</text><text x="118" y="718" class="sm">trained on paired H&amp;E and Visium spatial transcriptomics</text><path d="M465 505C478 505 484 505 495 505" class="a"/><text x="530" y="165" class="h">2. Deep prediction model</text><text x="530" y="193" class="su">Image-to-gene mapping plus spatial reconstruction</text><rect x="535" y="235" width="530" height="250" rx="22" class="sp"/><g transform="translate(570 275)"><rect x="0" y="0" width="160" height="80" rx="16" fill="#f8e2e6" stroke="#be8792"/><text x="35" y="48" class="m">patch encoder</text><rect x="220" y="0" width="160" height="80" rx="16" fill="#eef4ff" stroke="#9db6e4"/><text x="245" y="48" class="m">gene decoder</text><path d="M160 40C185 40 195 40 220 40" class="a"/><rect x="430" y="0" width="80" height="80" rx="16" fill="#4f7bd9"/><text x="447" y="48" class="m" fill="#fff">x_hat</text><path d="M380 40C402 40 410 40 430 40" class="a"/><text x="0" y="145" class="m">compare predicted ST against measured spatial expression</text><rect x="0" y="175" width="115" height="15" rx="7" class="expr"/><rect x="130" y="175" width="75" height="15" rx="7" class="expr" opacity=".65"/><rect x="220" y="175" width="150" height="15" rx="7" class="expr" opacity=".85"/></g><rect x="535" y="530" width="530" height="260" rx="22" class="sp"/><g transform="translate(570 570)"><text x="0" y="0" class="m">spatial biomarker construction</text><path d="M35 80C95 20 210 35 255 105C300 175 235 245 135 230C60 220 0 145 35 80Z" fill="#f7f9ff" stroke="#c4d3ea"/><path d="M55 170C105 110 185 175 235 82" stroke="#d94f70" stroke-width="5" fill="none"/><path d="M72 85C145 60 205 100 220 190" stroke="#4f7bd9" stroke-width="4" fill="none"/><text x="300" y="78" class="m">spatial patterns -> SPAND</text><text x="300" y="110" class="m">HER2 admixture</text><text x="300" y="142" class="m">therapy-response association</text><text x="0" y="240" class="sm">Main caveat: predicted ST is model-derived evidence requiring independent validation.</text></g><path d="M1110 505C1122 505 1128 505 1140 505" class="a"/><text x="1175" y="165" class="h">3. Outputs</text><text x="1175" y="193" class="su">Clinical and biological summaries</text><g transform="translate(1185 250)"><rect x="0" y="0" width="310" height="110" rx="18" class="bio"/><text x="25" y="40" class="m">breast cancer subgroups</text><text x="25" y="68" class="sm">defined by predicted spatial expression patterns</text><rect x="0" y="160" width="310" height="110" rx="18" class="risk"/><text x="25" y="200" class="m">survival and treatment response</text><text x="25" y="228" class="sm">trastuzumab response signal highlighted</text><rect x="0" y="320" width="310" height="120" rx="18" class="mix"/><text x="25" y="360" class="m">spatial biomarker layer</text><text x="25" y="388" class="sm">converts gene maps into interpretable tissue architecture measures</text></g></svg>
