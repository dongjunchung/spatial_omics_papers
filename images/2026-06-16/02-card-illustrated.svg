<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">CARD spatially informed deconvolution</title>
  <desc id="desc">Reference expression and spot counts are combined with conditional autoregressive spatial smoothing for cell-type proportions.</desc>
  <defs>
    <linearGradient id="tissueGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4aa3a2" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#f0b84d" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#c174d8" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="latentGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#f0b84d" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#c174d8" stop-opacity="0.92"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22313f"/></marker>
    <style>
      .bg{fill:#fbfbf7}.panel{fill:#ffffff;stroke:#22313f;stroke-width:2.2}.h{font:700 27px Arial,sans-serif;fill:#17232c}.t{font:19px Arial,sans-serif;fill:#24323d}.s{font:15px Arial,sans-serif;fill:#50616e}.xs{font:13px Arial,sans-serif;fill:#5f6f7a}.arrow{stroke:#22313f;stroke-width:3.4;fill:none;marker-end:url(#arrow)}.cell{fill:#ffffff;stroke:#4aa3a2;stroke-width:2.4}.spot{fill:#4aa3a2;opacity:.86}.spot2{fill:#f0b84d;opacity:.86}.spot3{fill:#c174d8;opacity:.86}.node{fill:#ffffff;stroke:#f0b84d;stroke-width:2.3}.edge{stroke:#34495e;stroke-width:2.2;opacity:.65}.edge2{stroke:#c174d8;stroke-width:3.2;opacity:.78}.chip{fill:#f8fbff;stroke:#f0b84d;stroke-width:2}.chip2{fill:#fff8ed;stroke:#c174d8;stroke-width:2}.chip3{fill:#f4fff6;stroke:#5dbb63;stroke-width:2}.latent{fill:url(#latentGrad);opacity:.86}.dash{stroke-dasharray:8 7}.thick{stroke-width:5}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <rect class="panel" x="45" y="55" width="375" height="650" rx="28"/>
  <rect class="panel" x="512" y="55" width="375" height="650" rx="28"/>
  <rect class="panel" x="980" y="55" width="375" height="650" rx="28"/>
  <text class="h" x="80" y="105">Biological input</text>
  <text class="h" x="545" y="105">CAR mixture model</text>
  <text class="h" x="1015" y="105">Composition maps</text>

  <path d="M105 190 C130 120 245 115 310 155 C380 198 350 320 285 355 C205 398 90 335 82 260 C78 225 88 205 105 190 Z" fill="url(#tissueGrad)" stroke="#4aa3a2" stroke-width="3"/>
  <path d="M122 235 C185 185 245 178 326 225" stroke="#f0b84d" stroke-width="5" fill="none" opacity=".72"/>
  <path d="M118 305 C172 275 242 292 322 330" stroke="#c174d8" stroke-width="5" fill="none" opacity=".68"/>
  <circle class="cell" cx="138" cy="208" r="20"/><circle class="cell" cx="206" cy="180" r="17"/><circle class="cell" cx="286" cy="218" r="23"/><circle class="cell" cx="154" cy="304" r="24"/><circle class="cell" cx="245" cy="305" r="19"/><circle class="cell" cx="323" cy="284" r="16"/>
  <circle class="spot" cx="122" cy="258" r="7"/><circle class="spot2" cx="182" cy="245" r="7"/><circle class="spot3" cx="238" cy="228" r="7"/><circle class="spot" cx="298" cy="263" r="7"/><circle class="spot2" cx="210" cy="334" r="7"/><circle class="spot3" cx="332" cy="333" r="7"/>
  <g transform="translate(92 392)">
    <rect class="chip" x="0" y="0" width="92" height="78" rx="12"/><path d="M14 54 C32 22 55 24 76 36" stroke="#f0b84d" stroke-width="4" fill="none"/><text class="xs" x="14" y="24">image</text>
    <rect class="chip2" x="116" y="0" width="92" height="78" rx="12"/><path d="M130 56 L145 24 L160 46 L176 18 L194 58" stroke="#c174d8" stroke-width="4" fill="none"/><text class="xs" x="130" y="24">genes</text>
    <rect class="chip3" x="232" y="0" width="92" height="78" rx="12"/><circle cx="252" cy="45" r="7" fill="#5dbb63"/><circle cx="286" cy="30" r="7" fill="#5dbb63"/><circle cx="304" cy="55" r="7" fill="#5dbb63"/><path d="M252 45 L286 30 L304 55" stroke="#5dbb63" stroke-width="3" fill="none"/><text class="xs" x="246" y="24">space</text>
  </g>
  <text class="s" x="80" y="500">spatial count matrix</text>
<text class="s" x="80" y="522">single-cell reference profiles</text>
<text class="s" x="80" y="544">neighbor graph over spots</text>

  <path class="arrow" d="M424 380 C460 380 475 380 507 380"/>
  <g transform="translate(550 148)">
    <rect class="chip" x="0" y="0" width="285" height="92" rx="18"/>
    <text class="t" x="24" y="38">Reference signatures</text>
    <text class="xs" x="24" y="66">cell-type expression basis</text>
    <rect class="chip2" x="0" y="137" width="285" height="92" rx="18"/>
    <text class="t" x="24" y="175">Spot likelihood</text>
    <text class="xs" x="24" y="203">observed counts as mixtures</text>
    <rect class="chip3" x="0" y="274" width="285" height="92" rx="18"/>
    <text class="t" x="24" y="312">Spatial CAR prior</text>
    <text class="xs" x="24" y="340">neighbor borrowing with uncertainty</text>
    <path class="arrow" d="M142 95 L142 132"/>
    <path class="arrow" d="M142 232 L142 269"/>
  </g>
  <g transform="translate(595 560)">
    <circle class="node" cx="0" cy="0" r="15"/><circle class="node" cx="65" cy="-20" r="15"/><circle class="node" cx="130" cy="0" r="15"/><circle class="node" cx="35" cy="52" r="15"/><circle class="node" cx="105" cy="52" r="15"/>
    <path class="edge" d="M0 0 L65 -20 L130 0 L105 52 L35 52 Z"/>
    <path class="edge2" d="M0 0 L105 52 M65 -20 L35 52"/>
  </g>
  <text class="s" x="495" y="490">latent cell-type proportions</text>
<text class="s" x="495" y="512">conditional autoregressive prior</text>
<text class="s" x="495" y="534">high-resolution refinement</text>

  <path class="arrow" d="M892 380 C930 380 945 380 975 380"/>
  <g transform="translate(1030 135)">
    <path d="M42 45 C88 8 186 16 226 60 C260 98 236 168 178 188 C112 210 40 178 26 120 C18 88 22 62 42 45 Z" fill="#eef7ff" stroke="#f0b84d" stroke-width="3"/>
    <path d="M50 118 C94 85 148 82 224 110" stroke="#c174d8" stroke-width="5" fill="none" opacity=".75"/>
    <circle class="spot" cx="70" cy="82" r="8"/><circle class="spot2" cx="122" cy="62" r="8"/><circle class="spot3" cx="190" cy="85" r="8"/><circle class="spot" cx="104" cy="146" r="8"/><circle class="spot2" cx="170" cy="155" r="8"/>
    <rect class="chip" x="0" y="250" width="110" height="82" rx="14"/><text class="xs" x="18" y="282">map</text><path d="M18 314 C40 286 72 292 94 270" stroke="#f0b84d" stroke-width="4" fill="none"/>
    <rect class="chip2" x="136" y="250" width="110" height="82" rx="14"/><text class="xs" x="154" y="282">score</text><rect x="158" y="298" width="16" height="20" fill="#4aa3a2"/><rect x="184" y="288" width="16" height="30" fill="#f0b84d"/><rect x="210" y="276" width="16" height="42" fill="#c174d8"/>
    <rect class="chip3" x="68" y="365" width="142" height="76" rx="14"/><text class="xs" x="91" y="395">uncertainty</text><path d="M92 420 C114 396 136 444 166 413" stroke="#5dbb63" stroke-width="4" fill="none"/>
  </g>
  <text class="s" x="905" y="500">cell-type proportion maps</text>
<text class="s" x="905" y="522">imputed expression surfaces</text>
<text class="s" x="905" y="544">smoothed but boundary-aware estimates</text>
  <text class="s" x="70" y="775">CARD makes spatial borrowing a model component for deconvolution and expression imputation.</text>
</svg>
