<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">N-Orbit: towards a universal model and metric for comparing tissue microenvironments technical summary</title>
  <desc id="desc">A five-stage diagram showing inputs, preprocessing, model, objectives, and outputs.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #17202a; }
      .subtitle { font: 500 21px Arial, sans-serif; fill: #52616b; }
      .box-title { font: 700 24px Arial, sans-serif; fill: white; }
      .item { font: 500 20px Arial, sans-serif; fill: #243442; }
      .note { font: 500 18px Arial, sans-serif; fill: #425466; }
      .arrow { stroke: #718096; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="50" y="62" class="title">N-Orbit: towards a universal model and metric for comparing</text><text x="50" y="107" class="title">tissue microenvironments</text>
  <text x="1550" y="62" text-anchor="end" class="subtitle">peer-reviewed | 2026-05-22</text>
  
      <rect x="34" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#0f4c5c" stroke-width="4"/>
      <rect x="34" y="168" width="276" height="64" rx="20" fill="#0f4c5c"/>
      <rect x="34" y="210" width="276" height="22" fill="#0f4c5c"/>
      <text x="172" y="210" text-anchor="middle" class="box-title">Inputs</text>
      
        <circle cx="62" cy="253" r="6" fill="#0f4c5c"/>
        <text x="80" y="258" class="item">Detected cellular</text><text x="80" y="285" class="item">neighborhoods</text>
        <circle cx="62" cy="327" r="6" fill="#0f4c5c"/>
        <text x="80" y="332" class="item">Cell-type labels</text>
        <circle cx="62" cy="385" r="6" fill="#0f4c5c"/>
        <text x="80" y="390" class="item">Within-neighborhood spatial</text><text x="80" y="417" class="item">relationships</text>
        <circle cx="62" cy="459" r="6" fill="#0f4c5c"/>
        <text x="80" y="464" class="item">Sample or phenotype metadata</text>
      <path d="M 315 418 H 335" class="arrow"/>
      <rect x="342" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#2a9d8f" stroke-width="4"/>
      <rect x="342" y="168" width="276" height="64" rx="20" fill="#2a9d8f"/>
      <rect x="342" y="210" width="276" height="22" fill="#2a9d8f"/>
      <text x="480" y="210" text-anchor="middle" class="box-title">Preprocessing</text>
      
        <circle cx="370" cy="253" r="6" fill="#2a9d8f"/>
        <text x="388" y="258" class="item">Define neighborhood</text><text x="388" y="285" class="item">membership</text>
        <circle cx="370" cy="327" r="6" fill="#2a9d8f"/>
        <text x="388" y="332" class="item">Summarize cell-type</text><text x="388" y="359" class="item">composition</text>
        <circle cx="370" cy="401" r="6" fill="#2a9d8f"/>
        <text x="388" y="406" class="item">Extract spatial motif</text><text x="388" y="433" class="item">information</text>
      <path d="M 623 418 H 643" class="arrow"/>
      <rect x="650" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#e76f51" stroke-width="4"/>
      <rect x="650" y="168" width="276" height="64" rx="20" fill="#e76f51"/>
      <rect x="650" y="210" width="276" height="22" fill="#e76f51"/>
      <text x="788" y="210" text-anchor="middle" class="box-title">Model / inference</text>
      
        <circle cx="678" cy="253" r="6" fill="#e76f51"/>
        <text x="696" y="258" class="item">Encode each neighborhood as</text><text x="696" y="285" class="item">an N-Orbit vector</text>
        <circle cx="678" cy="327" r="6" fill="#e76f51"/>
        <text x="696" y="332" class="item">Retain composition and</text><text x="696" y="359" class="item">spatial organization</text>
        <circle cx="678" cy="401" r="6" fill="#e76f51"/>
        <text x="696" y="406" class="item">Compute</text><text x="696" y="433" class="item">neighborhood-to-neighborhood</text><text x="696" y="460" class="item">distances</text>
        <circle cx="678" cy="502" r="6" fill="#e76f51"/>
        <text x="696" y="507" class="item">Trace vector differences to</text><text x="696" y="534" class="item">enriched motifs</text>
      <path d="M 931 418 H 951" class="arrow"/>
      <rect x="958" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#f4a261" stroke-width="4"/>
      <rect x="958" y="168" width="276" height="64" rx="20" fill="#f4a261"/>
      <rect x="958" y="210" width="276" height="22" fill="#f4a261"/>
      <text x="1096" y="210" text-anchor="middle" class="box-title">Objectives</text>
      
        <circle cx="986" cy="253" r="6" fill="#f4a261"/>
        <text x="1004" y="258" class="item">Comparable</text><text x="1004" y="285" class="item">tissue-architecture</text><text x="1004" y="312" class="item">representation</text>
        <circle cx="986" cy="354" r="6" fill="#f4a261"/>
        <text x="1004" y="359" class="item">Efficient cross-neighborhood</text><text x="1004" y="386" class="item">distance</text>
        <circle cx="986" cy="428" r="6" fill="#f4a261"/>
        <text x="1004" y="433" class="item">Interpretable spatial</text><text x="1004" y="460" class="item">differences</text>
      <path d="M 1239 418 H 1259" class="arrow"/>
      <rect x="1266" y="168" width="276" height="520" rx="22" fill="#ffffff" stroke="#0f4c5c" stroke-width="4"/>
      <rect x="1266" y="168" width="276" height="64" rx="20" fill="#0f4c5c"/>
      <rect x="1266" y="210" width="276" height="22" fill="#0f4c5c"/>
      <text x="1404" y="210" text-anchor="middle" class="box-title">Outputs</text>
      
        <circle cx="1294" cy="253" r="6" fill="#0f4c5c"/>
        <text x="1312" y="258" class="item">Neighborhood similarity</text><text x="1312" y="285" class="item">matrix</text>
        <circle cx="1294" cy="327" r="6" fill="#0f4c5c"/>
        <text x="1312" y="332" class="item">Neighborhood-type</text><text x="1312" y="359" class="item">discrimination</text>
        <circle cx="1294" cy="401" r="6" fill="#0f4c5c"/>
        <text x="1312" y="406" class="item">Clinical-variable prediction</text><text x="1312" y="433" class="item">features</text>
        <circle cx="1294" cy="475" r="6" fill="#0f4c5c"/>
        <text x="1312" y="480" class="item">Cross-species homologous</text><text x="1312" y="507" class="item">structures</text>
      
  <rect x="34" y="728" width="1512" height="122" rx="18" fill="#edf2f7"/>
  <text x="62" y="774" class="note">Scope note: N-Orbit compares neighborhoods supplied by upstream detection methods; it is not itself a neighborhood-detection</text><text x="62" y="804" class="note">algorithm.</text>
</svg>
