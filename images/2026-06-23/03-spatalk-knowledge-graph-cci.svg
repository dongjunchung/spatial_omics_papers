<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">SpaTalk spatial ligand receptor target inference</title>
  <desc id="desc">A schematic showing spatial cell or spot data decomposed into cells, proximity graph construction, ligand-receptor coexpression and knowledge graph scoring of downstream targets.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf8}.panel{fill:#fff;stroke:#2f2f2f;stroke-width:2}.h{font:700 25px Arial,sans-serif;fill:#202124}.t{font:18px Arial,sans-serif;fill:#202124}.s{font:15px Arial,sans-serif;fill:#4d5156}.arrow{stroke:#202124;stroke-width:3;fill:none;marker-end:url(#a)}.cell{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.kg{fill:#fce7f3;stroke:#be185d;stroke-width:2}.score{fill:#ecfccb;stroke:#4d7c0f;stroke-width:2}.sig{fill:#ffedd5;stroke:#c2410c;stroke-width:2}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#202124"/></marker>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <rect class="panel" x="45" y="55" width="300" height="560" rx="24"/><rect class="panel" x="450" y="55" width="300" height="560" rx="24"/><rect class="panel" x="855" y="55" width="300" height="560" rx="24"/>
  <text class="h" x="80" y="105">Spatial cells / spots</text><text class="h" x="495" y="105">SpaTalk evidence</text><text class="h" x="895" y="105">Communication map</text>
  <g>
    <circle class="cell" cx="115" cy="170" r="22"/><circle class="cell" cx="195" cy="145" r="22"/><circle class="cell" cx="255" cy="220" r="22"/><circle class="cell" cx="140" cy="275" r="22"/><circle class="cell" cx="235" cy="315" r="22"/>
    <path d="M115 170 L195 145 L255 220 L235 315 L140 275 L115 170 M195 145 L140 275" stroke="#0369a1" stroke-width="3" fill="none"/>
    <text class="t" x="90" y="390">cell graph</text><text class="s" x="90" y="420">or reconstructed cells from spots</text>
    <rect class="cell" x="90" y="480" width="190" height="55" rx="12"/><text class="s" x="115" y="514">scRNA reference for decomposition</text>
  </g>
  <path class="arrow" d="M350 335 L445 335"/>
  <g>
    <rect class="sig" x="500" y="135" width="200" height="80" rx="16"/><text class="t" x="535" y="170">L-R proximity</text><text class="s" x="535" y="198">neighbor pairs</text>
    <rect class="kg" x="500" y="270" width="200" height="80" rx="16"/><text class="t" x="535" y="305">L-R-T graph</text><text class="s" x="535" y="333">pathway priors</text>
    <rect class="score" x="500" y="405" width="200" height="80" rx="16"/><text class="t" x="535" y="440">random walk</text><text class="s" x="535" y="468">target scoring</text>
    <path class="arrow" d="M600 218 L600 265"/><path class="arrow" d="M600 353 L600 400"/>
  </g>
  <path class="arrow" d="M755 335 L850 335"/>
  <g>
    <circle class="cell" cx="955" cy="190" r="25"/><circle class="cell" cx="1080" cy="255" r="25"/><circle class="cell" cx="975" cy="390" r="25"/>
    <path class="arrow" d="M976 200 C1015 205 1045 225 1060 245"/>
    <path class="arrow" d="M1070 280 C1040 330 1015 365 990 380"/>
    <rect class="score" x="910" y="465" width="205" height="65" rx="14"/><text class="t" x="940" y="506">ranked L-R-T signals</text>
  </g>
  <text class="s" x="70" y="640">Digest interpretation: SpaTalk combines spatial contact with intracellular target evidence, making communication less purely correlation based.</text>
</svg>
