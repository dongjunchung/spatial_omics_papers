<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#f9fcfb}.p{fill:#fff;stroke:#d8e7e2;stroke-width:2}.h{font:700 25px Arial;fill:#153128}.s{font:600 16px Arial;fill:#405f55}.t{font:14px Arial;fill:#284238}.m{font:16px Consolas;fill:#203c33}.a{stroke:#3b8f7a;stroke-width:3;fill:none;marker-end:url(#ar)}.cell{fill:#d9f0e8;stroke:#6cae9b;stroke-width:2}.ct1{fill:#4f7bd9}.ct2{fill:#f28e2b}.ct3{fill:#59a14f}.exp{fill:#fff4d6;stroke:#c89f33;stroke-width:2}.edge{stroke:#9bc8bc;stroke-width:3;fill:none}.bar{fill:#3b8f7a}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#3b8f7a"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">GC-MoE: cell-type-specific experts for single-cell spatial expression</text><text x="60" y="85" class="s">Predict cell-level gene expression from histology by routing each cell through inferred cell-type programs</text>
<rect x="55" y="125" width="365" height="610" rx="24" class="p"/><rect x="517" y="125" width="365" height="610" rx="24" class="p"/><rect x="980" y="125" width="365" height="610" rx="24" class="p"/>
<text x="90" y="165" class="h">Input cells</text><text x="90" y="195" class="s">Histology patches + cell positions</text><g transform="translate(105 260)"><path d="M20 70C80 10 225 20 270 105C315 190 240 280 125 265C45 255-20 150 20 70Z" fill="#eef7f4" stroke="#bfd8d0" stroke-width="2"/><circle cx="70" cy="95" r="24" class="cell"/><circle cx="130" cy="78" r="24" class="cell"/><circle cx="190" cy="115" r="24" class="cell"/><circle cx="95" cy="160" r="24" class="cell"/><circle cx="160" cy="172" r="24" class="cell"/><circle cx="220" cy="210" r="24" class="cell"/><path d="M70 95L130 78L190 115L160 172L95 160Z" class="edge"/><text x="25" y="335" class="m">cell image token + coordinates</text><text x="25" y="365" class="t">single-cell prediction, not spot averaging</text></g>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Routing model</text><text x="552" y="195" class="s">Genomics-guided mixture of experts</text><g transform="translate(560 245)"><rect x="0" y="0" width="275" height="75" rx="16" fill="#eef7f4" stroke="#9bc8bc" stroke-width="2"/><text x="32" y="45" class="m">routing network: p(cell type | image)</text><circle cx="50" cy="150" r="28" class="ct1"/><circle cx="140" cy="150" r="28" class="ct2"/><circle cx="230" cy="150" r="28" class="ct3"/><text x="23" y="208" class="t">expert A</text><text x="113" y="208" class="t">expert B</text><text x="203" y="208" class="t">expert C</text><path d="M130 75L55 122" class="a"/><path d="M140 75L140 122" class="a"/><path d="M150 75L225 122" class="a"/><rect x="18" y="265" width="245" height="62" rx="14" class="exp"/><text x="42" y="303" class="m">co-expression-aware predictor</text><path d="M50 178L80 265" class="a"/><path d="M140 178L140 265" class="a"/><path d="M230 178L200 265" class="a"/><rect x="20" y="390" width="245" height="55" rx="14" fill="#e8f3ff" stroke="#9bb7dc"/><text x="45" y="425" class="m">cell-to-cell attention</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">Output</text><text x="1015" y="195" class="s">Single-cell spatial gene expression</text><g transform="translate(1025 260)"><circle cx="70" cy="95" r="24" class="ct1"/><circle cx="130" cy="78" r="24" class="ct2"/><circle cx="190" cy="115" r="24" class="ct3"/><circle cx="95" cy="160" r="24" class="ct1"/><circle cx="160" cy="172" r="24" class="ct2"/><circle cx="220" cy="210" r="24" class="ct3"/><path d="M70 95L130 78L190 115L160 172L95 160Z" class="edge"/><g transform="translate(20 310)"><text x="0" y="0" class="m">gene vector per cell</text><rect x="0" y="35" width="170" height="16" rx="8" class="bar"/><rect x="0" y="68" width="110" height="16" rx="8" fill="#79b7a8"/><rect x="0" y="101" width="210" height="16" rx="8" fill="#2f6f62"/><text x="0" y="160" class="t">cell-type probabilities softly weight experts;</text><text x="0" y="185" class="t">neighbors add local cellular context.</text></g></g>
</svg>
