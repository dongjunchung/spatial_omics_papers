<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fbfcff}.p{fill:#fff;stroke:#dbe5f4;stroke-width:2}.h{font:700 25px Arial;fill:#14233d}.s{font:600 16px Arial;fill:#3f536e}.t{font:14px Arial;fill:#2b3a50}.m{font:16px Consolas;fill:#20304a}.a{stroke:#4b74bd;stroke-width:3;fill:none;marker-end:url(#ar)}.spot{fill:#d9e7ff;stroke:#7da3de;stroke-width:2}.anchor{fill:#f28e2b;stroke:#9b5a16;stroke-width:2}.mask{fill:#e9edf5;stroke:#aab6c8;stroke-width:2;stroke-dasharray:5 4}.img{fill:#cfe7dc}.expr{fill:#4f7bd9}.hot{fill:#d94f70}.gene{stroke:#4f7bd9;stroke-width:3;fill:none}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#4b74bd"/></marker></defs>
