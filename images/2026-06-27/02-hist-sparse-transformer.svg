<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fcfbff}.p{fill:#fff;stroke:#e2dff0;stroke-width:2}.h{font:700 25px Arial;fill:#201b35}.s{font:600 16px Arial;fill:#4b4662}.t{font:14px Arial;fill:#302b43}.m{font:16px Consolas;fill:#2b2543}.a{stroke:#6a5acd;stroke-width:3;fill:none;marker-end:url(#ar)}.tile{fill:#ece8ff;stroke:#afa5e8;stroke-width:2}.act{fill:#7b68ee;stroke:#3e35a8;stroke-width:2}.win{fill:none;stroke:#f28e2b;stroke-width:4}.cal{fill:#ffd166;stroke:#9a7500;stroke-width:2}.out{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6a5acd"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">HiST: hierarchical sparse transformer for cross-modal ST</text><text x="60" y="85" class="s">Model only active measured locations on the tissue footprint, then aggregate multiscale context sparsely</text>
<rect x="55" y="125" width="365" height="610" rx="24" class="p"/><rect x="517" y="125" width="365" height="610" rx="24" class="p"/><rect x="980" y="125" width="365" height="610" rx="24" class="p"/>
<text x="90" y="165" class="h">Sparse field</text><text x="90" y="195" class="s">Measured ST locations on WSI</text><g transform="translate(105 250)"><path d="M20 70C85 5 230 20 270 105C315 200 235 290 125 270C45 255-25 155 20 70Z" fill="#f3f1ff" stroke="#d4cee9" stroke-width="2"/><g><rect x="45" y="75" width="28" height="28" class="tile"/><rect x="85" y="55" width="28" height="28" class="act"/><rect x="125" y="70" width="28" height="28" class="tile"/><rect x="165" y="85" width="28" height="28" class="act"/><rect x="205" y="120" width="28" height="28" class="tile"/><rect x="60" y="130" width="28" height="28" class="act"/><rect x="100" y="125" width="28" height="28" class="tile"/><rect x="145" y="140" width="28" height="28" class="act"/><rect x="190" y="180" width="28" height="28" class="tile"/><rect x="95" y="200" width="28" height="28" class="act"/></g><text x="25" y="335" class="m">runtime ~ active locations</text><text x="25" y="366" class="t">not dense slide area</text></g>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Sparse transformer</text><text x="552" y="195" class="s">Window attention + dyadic scale changes</text><g transform="translate(560 245)"><rect x="0" y="0" width="300" height="230" rx="18" fill="#f8f6ff" stroke="#d4cee9" stroke-width="2"/><g><rect x="35" y="35" width="32" height="32" class="act"/><rect x="80" y="35" width="32" height="32" class="tile"/><rect x="125" y="35" width="32" height="32" class="act"/><rect x="170" y="35" width="32" height="32" class="tile"/><rect x="215" y="35" width="32" height="32" class="act"/><rect x="35" y="85" width="32" height="32" class="tile"/><rect x="80" y="85" width="32" height="32" class="act"/><rect x="125" y="85" width="32" height="32" class="act"/><rect x="170" y="85" width="32" height="32" class="tile"/><rect x="215" y="85" width="32" height="32" class="act"/></g><rect x="28" y="25" width="145" height="110" class="win" rx="12"/><text x="32" y="178" class="m">local sparse attention</text><path d="M70 250L150 305L230 250" stroke="#6a5acd" stroke-width="4" fill="none"/><circle cx="70" cy="250" r="18" class="act"/><circle cx="150" cy="305" r="22" class="cal"/><circle cx="230" cy="250" r="18" class="act"/><text x="55" y="360" class="m">dyadic encoder-decoder</text><rect x="30" y="395" width="250" height="55" rx="14" class="cal"/><text x="53" y="430" class="m">slide calibration token</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">Prediction</text><text x="1015" y="195" class="s">Expression at sparse tissue locations</text><g transform="translate(1035 260)"><path d="M20 70C85 5 230 20 270 105C315 200 235 290 125 270C45 255-25 155 20 70Z" fill="#f4fbf8" stroke="#b7d8cb" stroke-width="2"/><rect x="45" y="75" width="34" height="34" class="out"/><rect x="90" y="58" width="34" height="34" fill="#70a9a1"/><rect x="135" y="78" width="34" height="34" class="out"/><rect x="180" y="100" width="34" height="34" fill="#2f6f6b"/><rect x="75" y="145" width="34" height="34" class="out"/><rect x="125" y="150" width="34" height="34" fill="#70a9a1"/><rect x="178" y="185" width="34" height="34" class="out"/><text x="20" y="340" class="m">H&amp;E context -&gt; gene vector</text><text x="20" y="372" class="t">local correspondence plus slide-level calibration</text></g>
</svg>
