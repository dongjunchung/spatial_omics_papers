<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fffdf9}.p{fill:#fff;stroke:#eadfce;stroke-width:2}.h{font:700 25px Arial;fill:#332212}.s{font:600 16px Arial;fill:#65513b}.t{font:14px Arial;fill:#3f3020}.m{font:16px Consolas;fill:#372817}.a{stroke:#b56b21;stroke-width:3;fill:none;marker-end:url(#ar)}.att{fill:#d94f70;opacity:.75}.path{fill:#4f7bd9;opacity:.75}.gene{fill:#9ac66d;opacity:.75}.tile{fill:#f4eadc;stroke:#c6a87e;stroke-width:2}.bad{stroke:#d94f70;stroke-width:4;fill:none}.good{stroke:#4f7bd9;stroke-width:4;fill:none}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b56b21"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">Do foundation models see biology?</text><text x="60" y="85" class="s">Use co-registered spatial transcriptomics to evaluate whether pathology attention maps match transcriptional programs</text>
<rect x="55" y="125" width="365" height="610" rx="24" class="p"/><rect x="517" y="125" width="365" height="610" rx="24" class="p"/><rect x="980" y="125" width="365" height="610" rx="24" class="p"/>
<text x="90" y="165" class="h">Pathology model</text><text x="90" y="195" class="s">Attention over histology patches</text><g transform="translate(100 260)"><path d="M20 70C80 10 225 20 270 105C315 190 240 280 125 265C45 255-20 150 20 70Z" fill="#f6eee4" stroke="#c6a87e" stroke-width="2"/><rect x="55" y="75" width="44" height="44" class="tile"/><rect x="110" y="70" width="44" height="44" class="tile"/><rect x="165" y="85" width="44" height="44" class="tile"/><rect x="75" y="140" width="44" height="44" class="tile"/><rect x="130" y="145" width="44" height="44" class="tile"/><rect x="185" y="165" width="44" height="44" class="tile"/><circle cx="187" cy="107" r="35" class="att"/><circle cx="132" cy="167" r="28" class="att"/><text x="25" y="330" class="m">MIL attention map</text><text x="25" y="360" class="t">trained for glioblastoma molecular tasks</text></g>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Orthogonal ST check</text><text x="552" y="195" class="s">Compare attention to transcriptomic signatures</text><g transform="translate(555 245)"><path d="M25 70C85 10 230 22 275 105C320 195 245 285 130 270C45 260-20 150 25 70Z" fill="#f8fbff" stroke="#c6d4ee" stroke-width="2"/><circle cx="75" cy="100" r="20" class="gene"/><circle cx="128" cy="92" r="20" class="path"/><circle cx="185" cy="115" r="20" class="path"/><circle cx="105" cy="165" r="20" class="gene"/><circle cx="165" cy="175" r="20" class="path"/><circle cx="220" cy="205" r="20" class="gene"/><path d="M65 275C112 225 178 245 236 205" class="good"/><text x="15" y="335" class="m">attention x 87 ST signatures</text><text x="15" y="365" class="t">pathways, compartments, genes</text><rect x="20" y="410" width="250" height="55" rx="14" fill="#fff3e2" stroke="#c6a87e"/><text x="38" y="444" class="m">smoothness != biology</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">Result type</text><text x="1015" y="195" class="s">Biological coherence score</text><g transform="translate(1030 270)"><text x="0" y="0" class="m">enrichment gradient</text><rect x="0" y="35" width="220" height="34" rx="8" class="path"/><text x="235" y="58" class="t">pathways</text><rect x="0" y="95" width="145" height="34" rx="8" fill="#7aa6d9"/><text x="160" y="118" class="t">signatures</text><rect x="0" y="155" width="70" height="34" rx="8" class="gene"/><text x="85" y="178" class="t">genes</text><path d="M20 280C80 220 160 250 230 200" class="good"/><path d="M20 345C95 340 160 335 230 330" class="bad"/><text x="0" y="420" class="t">Interpretation: attention can align with multi-gene programs,</text><text x="0" y="445" class="t">but spatially smooth heatmaps alone are insufficient evidence.</text></g>
</svg>
