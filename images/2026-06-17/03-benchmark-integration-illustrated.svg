<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#fbfaf7"/>
  <style>.h{font:700 28px Arial;fill:#12335b}.t{font:600 17px Arial;fill:#12335b}.s{font:14px Arial;fill:#31445c}.box{fill:#fff;stroke:#2b6f8a;stroke-width:2;rx:16}.arrow{stroke:#2b6f8a;stroke-width:4;fill:none;marker-end:url(#a)}</style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2b6f8a"/></marker></defs>
  <text x="70" y="55" class="h">Benchmark inputs</text><text x="520" y="55" class="h">Integration method tasks</text><text x="1040" y="55" class="h">Task-specific guidance</text>
  <rect x="50" y="90" width="350" height="585" class="box"/>
  <g transform="translate(85 125)">
    <text x="0" y="0" class="t">Spatial data</text>
    <path d="M25 25 C85 -5 170 15 205 70 C230 115 190 170 120 175 C55 180 5 130 10 75 C12 50 15 35 25 25Z" fill="#eef4f7" stroke="#789"/>
    <g fill="#0f8b8d"><circle cx="55" cy="70" r="7"/><circle cx="90" cy="80" r="7"/><circle cx="125" cy="95" r="7"/></g>
    <g fill="#ee6c4d"><circle cx="150" cy="135" r="7"/><circle cx="180" cy="115" r="7"/></g>
    <text x="0" y="220" class="t">scRNA-seq reference</text>
    <g fill="#7b5fc9"><circle cx="35" cy="255" r="9"/><circle cx="60" cy="270" r="9"/><circle cx="42" cy="295" r="9"/></g>
    <g fill="#f2a541"><circle cx="125" cy="250" r="9"/><circle cx="155" cy="275" r="9"/><circle cx="130" cy="300" r="9"/></g>
    <text x="0" y="365" class="t">Holdout genes + simulated mixtures</text>
    <rect x="0" y="390" width="235" height="90" fill="#eef" stroke="#789"/>
    <g fill="#fff"><rect x="35" y="400" width="22" height="70"/><rect x="120" y="400" width="22" height="70"/></g>
    <text x="0" y="530" class="s">common preprocessing and train/test splits</text>
  </g>
  <path d="M400 382 L500 382" class="arrow"/>
  <rect x="505" y="90" width="420" height="585" class="box"/>
  <g transform="translate(545 125)">
    <rect x="0" y="0" width="335" height="70" fill="#eef4f7" stroke="#789"/><text x="20" y="43" class="t">Map cells to spots</text>
    <rect x="0" y="100" width="335" height="70" fill="#f4eef7" stroke="#789"/><text x="20" y="143" class="t">Transcript prediction</text>
    <rect x="0" y="200" width="335" height="70" fill="#f7f1e7" stroke="#789"/><text x="20" y="243" class="t">Cell-type deconvolution</text>
    <rect x="0" y="300" width="335" height="70" fill="#eef7f0" stroke="#789"/><text x="20" y="343" class="t">Impute held-out genes</text>
    <text x="0" y="430" class="t">Metrics</text>
    <g transform="translate(0 455)">
      <rect width="75" height="80" fill="#fff" stroke="#789"/><rect x="12" y="35" width="10" height="35" fill="#0f8b8d"/><rect x="30" y="20" width="10" height="50" fill="#7b5fc9"/><rect x="48" y="48" width="10" height="22" fill="#ee6c4d"/>
      <rect x="105" width="75" height="80" fill="#fff" stroke="#789"/><path d="M115 60 C135 20 155 70 175 30" stroke="#0f8b8d" stroke-width="4" fill="none"/>
      <rect x="210" width="75" height="80" fill="#fff" stroke="#789"/><circle cx="245" cy="40" r="25" fill="none" stroke="#ee6c4d" stroke-width="8"/>
      <text x="0" y="110" class="s">correlation, error, calibration, robustness, runtime</text>
    </g>
  </g>
  <path d="M925 382 L1025 382" class="arrow"/>
  <rect x="1030" y="90" width="320" height="585" class="box"/>
  <g transform="translate(1070 125)">
    <text x="0" y="0" class="t">Task-specific ranking</text>
    <g transform="translate(0 30)">
      <rect width="230" height="130" fill="#fff" stroke="#789"/>
      <rect x="30" y="25" width="160" height="18" fill="#0f8b8d"/><rect x="30" y="58" width="115" height="18" fill="#7b5fc9"/><rect x="30" y="91" width="75" height="18" fill="#ee6c4d"/>
    </g>
    <text x="0" y="210" class="t">Failure modes</text>
    <path d="M20 245 C75 210 135 230 165 280 C190 325 150 370 85 365 C35 360 5 325 10 285Z" fill="#eef4f7" stroke="#789"/>
    <g fill="#999"><circle cx="45" cy="285" r="6"/><circle cx="78" cy="250" r="6"/><circle cx="118" cy="310" r="6"/><circle cx="145" cy="280" r="6"/></g>
    <text x="0" y="410" class="t">Guidance matrix</text>
    <rect x="0" y="435" width="230" height="90" fill="#fff" stroke="#789"/>
    <line x1="0" y1="465" x2="230" y2="465" stroke="#789"/><line x1="0" y1="495" x2="230" y2="495" stroke="#789"/>
    <line x1="75" y1="435" x2="75" y2="525" stroke="#789"/><line x1="150" y1="435" x2="150" y2="525" stroke="#789"/>
    <text x="8" y="555" class="s">No universal best method: match task, platform and reference quality.</text>
  </g>
</svg>
