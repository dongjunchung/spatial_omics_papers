    <rect x="0" y="335" width="360" height="82" fill="#f4f6fa" stroke="#789"/>
    <text x="20" y="383" class="s">spot counts ~= topic profiles x nonnegative mixture + residual</text>
    <g transform="translate(0 455)">
      <rect width="80" height="65" fill="#e9eef7" stroke="#789"/><rect x="125" width="80" height="65" fill="#eff7f3" stroke="#789"/><rect x="250" width="80" height="65" fill="#f8eeee" stroke="#789"/>
      <text x="5" y="92" class="s">observed spot</text><text x="120" y="92" class="s">fit mixture</text><text x="253" y="92" class="s">residual</text>
    </g>
  </g>
  <path d="M925 382 L1020 382" class="arrow"/>
  <rect x="1025" y="90" width="325" height="585" class="box"/>
  <g transform="translate(1060 130)">
    <text x="0" y="0" class="t">Spot mixtures</text>
    <g transform="translate(0 25)">
      <circle cx="40" cy="40" r="25" fill="#fff" stroke="#789"/><path d="M40 40 L40 15 A25 25 0 0 1 63 50 Z" fill="#16a085"/><path d="M40 40 L63 50 A25 25 0 0 1 25 62 Z" fill="#7b5fc9"/><path d="M40 40 L25 62 A25 25 0 0 1 40 15 Z" fill="#ee6c4d"/>
