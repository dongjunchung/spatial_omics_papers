    <g transform="translate(0 170)">
      <path d="M20 15 C80 -15 150 5 180 60 C205 110 165 175 90 178 C30 180 -10 120 5 60 C8 40 10 28 20 15Z" fill="#eef4f7" stroke="#789"/>
      <g fill="#16a085"><circle cx="45" cy="55" r="8"/><circle cx="75" cy="70" r="8"/><circle cx="105" cy="85" r="8"/></g>
      <g fill="#7b5fc9"><circle cx="120" cy="125" r="8"/><circle cx="150" cy="115" r="8"/><circle cx="85" cy="135" r="8"/></g>
