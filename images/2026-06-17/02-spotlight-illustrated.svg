    <text x="0" y="390" class="t">Residual signal</text>
    <rect x="0" y="420" width="230" height="90" fill="#f8eeee" stroke="#789"/>
    <g fill="#999"><circle cx="35" cy="455" r="5"/><circle cx="65" cy="475" r="5"/><circle cx="100" cy="445" r="5"/><circle cx="150" cy="480" r="5"/><circle cx="195" cy="455" r="5"/></g>
