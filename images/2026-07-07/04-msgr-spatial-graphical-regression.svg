<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">mSGR technical visual abstract</title>
  <desc id="desc">Detailed schematic of multi-resolution spatial graphical regression showing hierarchical spatial transcriptomics domains, spatially varying precision matrices, edge selection, Gaussian process edge-strength variation, variational Bayes inference, and region-specific regulatory hubs.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf9}.panel{fill:#fff;stroke:#eadfce;stroke-width:2}.subpanel{fill:#fffaf3;stroke:#eadfce;stroke-width:1.6}.title{font:700 30px Arial,sans-serif;fill:#332212}.subtitle{font:600 17px Arial,sans-serif;fill:#65513b}.head{font:700 20px Arial,sans-serif;fill:#3b2815}.label{font:14px Arial,sans-serif;fill:#3f3020}.small{font:12px Arial,sans-serif;fill:#6f604e}.mono{font:15px Consolas,monospace;fill:#372817}.arrow{stroke:#b56b21;stroke-width:3;fill:none;marker-end:url(#arrow)}.thin{stroke:#c6a87e;stroke-width:2;fill:none}.z1{fill:#d7e7ff}.z2{fill:#ffe5c4}.z3{fill:#eadcf0}.z4{fill:#dff1df}.node{fill:#fff;stroke:#5f6f8f;stroke-width:2}.edge{stroke:#2f5f9f;stroke-width:4}.edge2{stroke:#d94f70;stroke-width:4}.weak{stroke:#9fb3d1;stroke-width:2}.grad{stroke:#d94f70;stroke-width:5;fill:none}.gp{stroke:#59a14f;stroke-width:4;fill:none}.vb{fill:#eef4ff;stroke:#9db6e4;stroke-width:2}.hub{fill:#d94f70;stroke:#7f2337;stroke-width:2}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#b56b21"/></marker>
  </defs>
  <rect width="1600" height="980" class="bg"/>
  <text x="60" y="56" class="title">mSGR: multi-resolution spatial graphical regression for hierarchical ST</text>
  <text x="60" y="86" class="subtitle">Paper-specific mechanism: spatially varying precision matrices, edge selection, GP edge strengths, and variational Bayes</text>

  <rect x="55" y="125" width="395" height="760" rx="24" class="panel"/>
  <rect x="485" y="125" width="675" height="760" rx="24" class="panel"/>
  <rect x="1195" y="125" width="350" height="760" rx="24" class="panel"/>

  <text x="90" y="165" class="head">1. Hierarchical spatial transcriptomics</text>
  <text x="90" y="193" class="subtitle">Tumor regions and pathological gradient</text>
  <g transform="translate(92 245)">
    <path d="M35 90 C102 20 270 30 332 128 C392 225 294 345 155 330 C55 320 -20 195 35 90 Z" class="z1" stroke="#8aa7d8" stroke-width="2"/>
    <path d="M145 48 C235 56 326 120 315 205 C246 198 192 160 151 97 C142 76 140 58 145 48 Z" class="z2" stroke="#e0a45e" stroke-width="2"/>
    <path d="M82 190 C145 240 232 238 315 205 C294 292 221 338 155 330 C105 324 78 265 82 190 Z" class="z3" stroke="#bd9bcc" stroke-width="2"/>
    <path d="M45 285 C125 225 205 164 308 65" class="grad"/>
    <text x="45" y="372" class="mono">normal -> transition -> tumor</text>
    <text x="45" y="402" class="small">multi-resolution regions are biologically ordered, not exchangeable bins</text>
  </g>
  <rect x="90" y="700" width="305" height="95" rx="16" class="subpanel"/>
  <text x="112" y="735" class="mono">Y_r: genes within spatial domain r</text>
  <text x="112" y="763" class="label">Goal: infer gene networks that change with r</text>

  <path d="M455 505 C468 505 474 505 485 505" class="arrow"/>

  <text x="520" y="165" class="head">2. Bayesian graphical regression</text>
  <text x="520" y="193" class="subtitle">Network edges vary across hierarchy and gradient</text>
  <rect x="525" y="230" width="590" height="265" rx="22" class="subpanel"/>
  <text x="552" y="265" class="head">Region-specific precision matrices</text>
  <g transform="translate(555 305)">
    <g>
      <text x="0" y="-12" class="mono">Theta_A</text>
      <circle cx="45" cy="40" r="18" class="node"/><circle cx="120" cy="30" r="18" class="node"/><circle cx="95" cy="100" r="18" class="node"/><circle cx="170" cy="88" r="18" class="node"/>
      <line x1="45" y1="40" x2="120" y2="30" class="weak"/><line x1="120" y1="30" x2="170" y2="88" class="weak"/><line x1="45" y1="40" x2="95" y2="100" class="edge"/><line x1="95" y1="100" x2="170" y2="88" class="weak"/>
    </g>
    <g transform="translate(205 0)">
      <text x="0" y="-12" class="mono">Theta_B</text>
      <circle cx="45" cy="40" r="18" class="node"/><circle cx="120" cy="30" r="18" class="node"/><circle cx="95" cy="100" r="18" class="node"/><circle cx="170" cy="88" r="18" class="node"/>
      <line x1="45" y1="40" x2="120" y2="30" class="edge"/><line x1="120" y1="30" x2="170" y2="88" class="edge2"/><line x1="45" y1="40" x2="95" y2="100" class="weak"/><line x1="95" y1="100" x2="170" y2="88" class="edge"/>
      <circle cx="120" cy="30" r="9" class="hub"/>
    </g>
    <g transform="translate(410 0)">
      <text x="0" y="-12" class="mono">Theta_C</text>
      <circle cx="45" cy="40" r="18" class="node"/><circle cx="120" cy="30" r="18" class="node"/><circle cx="95" cy="100" r="18" class="node"/><circle cx="170" cy="88" r="18" class="node"/>
      <line x1="45" y1="40" x2="120" y2="30" class="edge2"/><line x1="120" y1="30" x2="170" y2="88" class="weak"/><line x1="45" y1="40" x2="95" y2="100" class="edge"/><line x1="95" y1="100" x2="170" y2="88" class="edge2"/>
    </g>
  </g>
  <text x="552" y="462" class="mono">edges correspond to conditional gene dependencies via precision matrices</text>

  <rect x="525" y="535" width="590" height="280" rx="22" class="subpanel"/>
  <text x="552" y="570" class="head">Spatial borrowing and scalable inference</text>
  <g transform="translate(555 605)">
    <rect x="0" y="0" width="255" height="90" rx="16" fill="#fff3e2" stroke="#d49a52"/>
    <text x="20" y="34" class="mono">structured edge selection</text>
    <text x="20" y="62" class="small">borrows strength across nearby domains and gradients</text>
    <rect x="300" y="0" width="235" height="90" rx="16" class="vb"/>
    <text x="320" y="34" class="mono">mean-field VB</text>
    <text x="320" y="62" class="small">node-wise parallel regressions</text>
    <path d="M255 45 C275 45 285 45 300 45" class="arrow"/>
    <path d="M15 175 C85 90 170 210 260 125 C330 60 410 145 520 90" class="gp"/>
    <text x="20" y="218" class="mono">GP prior: edge strength varies smoothly over spatial/pathological position</text>
  </g>

  <path d="M1165 505 C1178 505 1184 505 1195 505" class="arrow"/>

  <text x="1230" y="165" class="head">3. Biological output</text>
  <text x="1230" y="193" class="subtitle">Region-specific regulatory organization</text>
  <g transform="translate(1225 245)">
    <rect x="0" y="0" width="285" height="115" rx="16" class="z1" stroke="#8aa7d8"/>
    <text x="20" y="36" class="mono">domain A: baseline network</text>
    <line x1="45" y1="78" x2="225" y2="78" class="weak"/>
    <rect x="0" y="155" width="285" height="115" rx="16" class="z2" stroke="#e0a45e"/>
    <text x="20" y="191" class="mono">transition: EMT hub</text>
    <line x1="48" y1="226" x2="232" y2="226" class="edge2"/><circle cx="142" cy="226" r="18" class="hub"/>
    <rect x="0" y="310" width="285" height="115" rx="16" class="z3" stroke="#bd9bcc"/>
    <text x="20" y="346" class="mono">tumor: rewired edges</text>
    <line x1="52" y1="395" x2="120" y2="368" class="edge"/><line x1="120" y1="368" x2="232" y2="405" class="weak"/><line x1="60" y1="365" x2="225" y2="380" class="edge2"/>
    <rect x="0" y="500" width="285" height="112" rx="16" class="subpanel"/>
    <text x="20" y="535" class="mono">Interpretation</text>
    <text x="20" y="562" class="small">The target is not only spatial expression,</text>
    <text x="20" y="584" class="small">but spatially changing conditional gene networks.</text>
  </g>
</svg>
