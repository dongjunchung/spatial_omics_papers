<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fffdf9}.p{fill:#fff;stroke:#eadfce;stroke-width:2}.h{font:700 25px Arial;fill:#332212}.s{font:600 16px Arial;fill:#65513b}.t{font:14px Arial;fill:#3f3020}.m{font:16px Consolas;fill:#372817}.a{stroke:#b56b21;stroke-width:3;fill:none;marker-end:url(#ar)}.z1{fill:#d7e7ff}.z2{fill:#ffe5c4}.z3{fill:#eadcf0}.node{fill:#fff;stroke:#5f6f8f;stroke-width:2}.edge{stroke:#2f5f9f;stroke-width:4}.weak{stroke:#9fb3d1;stroke-width:2}.grad{stroke:#d94f70;stroke-width:5;fill:none}.gp{stroke:#59a14f;stroke-width:4;fill:none}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b56b21"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">mSGR: multi-resolution spatial graphical regression</text><text x="60" y="85" class="s">Infer gene networks whose edges vary across hierarchical spatial domains and pathological gradients</text>
<rect x="55" y="125" width="365" height="610" rx="24" class="p"/><rect x="517" y="125" width="365" height="610" rx="24" class="p"/><rect x="980" y="125" width="365" height="610" rx="24" class="p"/>
<text x="90" y="165" class="h">Hierarchical ST input</text><text x="90" y="195" class="s">Domains along tumor gradient</text><g transform="translate(105 260)"><path d="M25 70C90 8 230 20 275 105C320 190 245 285 130 270C45 260-20 150 25 70Z" class="z1" stroke="#8aa7d8" stroke-width="2"/><path d="M115 30C195 35 275 96 260 170C205 165 155 135 120 80C112 60 112 42 115 30Z" class="z2" stroke="#e0a45e" stroke-width="2"/><path d="M62 150C115 190 180 190 260 170C240 235 185 275 130 270C88 266 65 215 62 150Z" class="z3" stroke="#bd9bcc" stroke-width="2"/><path d="M35 230C110 175 170 135 250 55" class="grad"/><text x="25" y="335" class="m">normal -&gt; transition -&gt; tumor</text><text x="25" y="365" class="t">multi-resolution spatial transcriptomics</text></g>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Spatial graphical model</text><text x="552" y="195" class="s">Precision matrices vary by region</text><g transform="translate(560 250)"><text x="15" y="0" class="m">Theta_r = gene network in region r</text><g transform="translate(10 55)"><circle cx="55" cy="50" r="20" class="node"/><circle cx="135" cy="35" r="20" class="node"/><circle cx="110" cy="120" r="20" class="node"/><circle cx="205" cy="95" r="20" class="node"/><line x1="55" y1="50" x2="135" y2="35" class="edge"/><line x1="135" y1="35" x2="205" y2="95" class="weak"/><line x1="55" y1="50" x2="110" y2="120" class="weak"/><line x1="110" y1="120" x2="205" y2="95" class="edge"/></g><g transform="translate(45 250)"><path d="M0 80C45 10 115 105 170 40C220-20 250 55 280 20" class="gp"/><text x="18" y="130" class="m">GP edge-strength variation</text></g><rect x="32" y="420" width="285" height="55" rx="14" fill="#fff3e2" stroke="#c6a87e"/><text x="52" y="455" class="m">spatially structured edge selection</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">Output</text><text x="1015" y="195" class="s">Region-specific regulatory hubs</text><g transform="translate(1025 250)"><rect x="0" y="0" width="270" height="95" rx="16" class="z1" stroke="#8aa7d8"/><text x="25" y="36" class="m">domain A: weak EMT edge</text><line x1="55" y1="65" x2="185" y2="65" class="weak"/><rect x="0" y="135" width="270" height="95" rx="16" class="z2" stroke="#e0a45e"/><text x="25" y="171" class="m">transition: strong hub</text><line x1="55" y1="200" x2="185" y2="200" class="edge"/><circle cx="120" cy="200" r="17" fill="#d94f70"/><rect x="0" y="270" width="270" height="95" rx="16" class="z3" stroke="#bd9bcc"/><text x="25" y="306" class="m">domain C: altered network</text><line x1="55" y1="335" x2="115" y2="315" class="edge"/><line x1="115" y1="315" x2="185" y2="340" class="weak"/><text x="0" y="435" class="t">Inference: augmented mean-field VB with node-wise regressions.</text></g>
</svg>
