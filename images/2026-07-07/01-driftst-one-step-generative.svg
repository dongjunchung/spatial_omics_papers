<defs><style>.bg{fill:#fbfcff}.p{fill:#fff;stroke:#dbe5f4;stroke-width:2}.h{font:700 25px Arial;fill:#14233d}.s{font:600 16px Arial;fill:#3f536e}.t{font:14px Arial;fill:#2b3a50}.m{font:16px Consolas;fill:#20304a}.a{stroke:#4b74bd;stroke-width:3;fill:none;marker-end:url(#ar)}.img{fill:#d7eadf;stroke:#8bb7a6;stroke-width:2}.src{fill:#e9edf5;stroke:#9aa9bd;stroke-width:2}.expr{fill:#4f7bd9}.gate{fill:#f28e2b}.hot{fill:#d94f70}.gene{stroke:#4f7bd9;stroke-width:3;fill:none}.cell{fill:#fff;stroke:#6f91c8;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#4b74bd"/></marker></defs>
