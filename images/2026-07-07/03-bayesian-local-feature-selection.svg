<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian local spatial feature selection technical visual abstract</title>
  <desc id="desc">Detailed schematic showing spatial multimodal omics inputs, random contiguous domain partition prior, local covariate and basis selection, reversible-jump MCMC, posterior consistency, and region-specific selected drivers.</desc>
  <defs>
    <style>
      .bg{fill:#fbfcf8}.panel{fill:#fff;stroke:#d7e4cf;stroke-width:2}.subpanel{fill:#f8fbf5;stroke:#dce9d5;stroke-width:1.6}.title{font:700 30px Arial,sans-serif;fill:#172817}.subtitle{font:600 17px Arial,sans-serif;fill:#485f46}.head{font:700 20px Arial,sans-serif;fill:#1d3019}.label{font:14px Arial,sans-serif;fill:#2d3d2a}.small{font:12px Arial,sans-serif;fill:#63725f}.mono{font:15px Consolas,monospace;fill:#243b23}.arrow{stroke:#57824a;stroke-width:3;fill:none;marker-end:url(#arrow)}.thin{stroke:#97b58d;stroke-width:2;fill:none}.dash{stroke:#97b58d;stroke-width:2;stroke-dasharray:6 5;fill:none}.z1{fill:#d7e7ff}.z2{fill:#ffe5c4}.z3{fill:#dff1df}.z4{fill:#eadcf0}.sel{fill:#59a14f}.off{fill:#e7ece3}.cov{stroke:#5b7f53;stroke-width:3;fill:none}.basis{stroke:#d67d2c;stroke-width:3;fill:none}.mcmc{fill:#fff3e2;stroke:#d49a52;stroke-width:2}.posterior{fill:#eef4ff;stroke:#9db6e4;stroke-width:2}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#57824a"/></marker>
  </defs>
  <rect width="1600" height="980" class="bg"/>
  <text x="60" y="56" class="title">Consistent Bayesian local spatial feature selection for spatial multimodal omics</text>
  <text x="60" y="86" class="subtitle">Paper-specific mechanism: random domain partition + local variable/basis selection + informed RJ-MCMC</text>

  <rect x="55" y="125" width="390" height="760" rx="24" class="panel"/>
  <rect x="480" y="125" width="675" height="760" rx="24" class="panel"/>
  <rect x="1190" y="125" width="355" height="760" rx="24" class="panel"/>

  <text x="90" y="165" class="head">1. Spatial multimodal regression</text>
  <text x="90" y="193" class="subtitle">Features and effects can be local</text>
  <path d="M105 295 C170 225 310 235 350 320 C392 408 315 515 195 505 C88 497 50 392 80 320 C86 306 94 296 105 295 Z" fill="#eef7eb" stroke="#c4d9bd" stroke-width="2"/>
  <g opacity=".95">
    <circle cx="130" cy="340" r="9" fill="#4f7bd9"/><circle cx="185" cy="310" r="9" fill="#f28e2b"/><circle cx="235" cy="330" r="9" fill="#4f7bd9"/><circle cx="295" cy="372" r="9" fill="#59a14f"/>
    <circle cx="150" cy="420" r="9" fill="#f28e2b"/><circle cx="225" cy="450" r="9" fill="#59a14f"/><circle cx="282" cy="430" r="9" fill="#4f7bd9"/>
  </g>
  <rect x="90" y="555" width="305" height="145" rx="16" class="subpanel"/>
  <text x="112" y="590" class="mono">Y(s) ~ X(s) beta_k + basis(s) alpha_k</text>
  <text x="112" y="622" class="label">features: covariates, modalities, bases</text>
  <text x="112" y="650" class="label">locality: beta_k changes by domain k</text>
  <text x="112" y="678" class="small">Question: which drivers matter in which tissue region?</text>
  <rect x="90" y="735" width="305" height="78" rx="16" class="posterior"/>
  <text x="112" y="770" class="mono">high-dimensional SMO setting</text>
  <text x="112" y="796" class="small">multimodal omics motivates local selection.</text>

  <path d="M450 505 C462 505 468 505 480 505" class="arrow"/>

  <text x="515" y="165" class="head">2. Bayesian model object</text>
  <text x="515" y="193" class="subtitle">Joint posterior over partitions and selected features</text>
  <rect x="520" y="235" width="285" height="250" rx="20" class="subpanel"/>
  <text x="545" y="268" class="head">Random domain partition prior</text>
  <path d="M560 330 C612 280 720 284 760 342 C805 408 748 470 665 468 C590 466 535 405 560 330 Z" class="z1" stroke="#8aa7d8" stroke-width="2"/>
  <path d="M650 300 C715 306 765 355 750 420 C705 412 660 385 632 342 C635 323 642 309 650 300 Z" class="z2" stroke="#e0a45e" stroke-width="2"/>
  <path d="M590 405 C635 435 695 438 750 420 C735 462 704 470 665 468 C625 467 602 442 590 405 Z" class="z3" stroke="#8fbd8f" stroke-width="2"/>
  <text x="545" y="450" class="mono">K unknown; contiguous flexible shapes</text>

  <rect x="840" y="235" width="275" height="250" rx="20" class="subpanel"/>
  <text x="865" y="268" class="head">Local selection prior</text>
  <g transform="translate(870 310)">
    <text x="0" y="0" class="mono">gamma_kj in {0,1}</text>
    <rect x="0" y="35" width="40" height="26" rx="5" class="sel"/><rect x="52" y="35" width="40" height="26" rx="5" class="off"/><rect x="104" y="35" width="40" height="26" rx="5" class="sel"/><rect x="156" y="35" width="40" height="26" rx="5" class="off"/>
    <rect x="0" y="86" width="40" height="26" rx="5" class="off"/><rect x="52" y="86" width="40" height="26" rx="5" class="sel"/><rect x="104" y="86" width="40" height="26" rx="5" class="off"/><rect x="156" y="86" width="40" height="26" rx="5" class="sel"/>
    <path d="M0 165 C45 120 90 190 150 135 C180 108 205 122 220 148" class="basis"/>
    <text x="0" y="210" class="small">select covariates or functional bases per region</text>
  </g>

  <rect x="520" y="535" width="595" height="250" rx="20" class="subpanel"/>
  <text x="545" y="570" class="head">Computation and theory</text>
  <g transform="translate(545 605)">
    <rect x="0" y="0" width="230" height="82" rx="16" class="mcmc"/>
    <text x="22" y="33" class="mono">informed RJ-MCMC</text>
    <text x="22" y="60" class="small">moves over K, boundaries, selected features</text>
    <rect x="300" y="0" width="230" height="82" rx="16" class="posterior"/>
    <text x="322" y="33" class="mono">posterior consistency</text>
    <text x="322" y="60" class="small">partition and feature recovery conditions</text>
    <path d="M230 41 C255 41 275 41 300 41" class="arrow"/>
    <text x="5" y="132" class="mono">p(P, gamma, beta | Y, X, S)</text>
    <text x="5" y="160" class="small">P = spatial partition; gamma = local feature inclusion indicators</text>
  </g>

  <path d="M1160 505 C1172 505 1178 505 1190 505" class="arrow"/>

  <text x="1225" y="165" class="head">3. Interpretable outputs</text>
  <text x="1225" y="193" class="subtitle">Region-specific selected drivers</text>
  <g transform="translate(1220 245)">
    <rect x="0" y="0" width="285" height="115" rx="16" class="z1" stroke="#8aa7d8"/>
    <text x="20" y="36" class="mono">domain A: X1 + basis3</text>
    <path d="M25 78 C70 42 130 92 230 50" class="cov"/>
    <rect x="0" y="155" width="285" height="115" rx="16" class="z2" stroke="#e0a45e"/>
    <text x="20" y="191" class="mono">domain B: X2 only</text>
    <path d="M25 235 C80 226 135 178 235 215" class="basis"/>
    <rect x="0" y="310" width="285" height="115" rx="16" class="z3" stroke="#8fbd8f"/>
    <text x="20" y="346" class="mono">domain C: local basis set</text>
    <path d="M25 388 C75 355 155 407 240 350" class="cov"/>
    <rect x="0" y="485" width="285" height="120" rx="16" class="subpanel"/>
    <text x="20" y="520" class="mono">Key interpretation</text>
    <text x="20" y="548" class="small">A feature can be important in one tissue region</text>
    <text x="20" y="570" class="small">and irrelevant in another; global selection would miss this.</text>
  </g>
</svg>
