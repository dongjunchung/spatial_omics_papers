<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fbfcf8}.p{fill:#fff;stroke:#dfe7d8;stroke-width:2}.h{font:700 25px Arial;fill:#172817}.s{font:600 16px Arial;fill:#485f46}.t{font:14px Arial;fill:#2d3d2a}.m{font:16px Consolas;fill:#243b23}.a{stroke:#57824a;stroke-width:3;fill:none;marker-end:url(#ar)}.z1{fill:#d7e7ff}.z2{fill:#ffe5c4}.z3{fill:#dff1df}.sel{fill:#59a14f}.off{fill:#e8ece5}.cov{stroke:#5b7f53;stroke-width:3;fill:none}.basis{stroke:#d67d2c;stroke-width:3;fill:none}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#57824a"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">Bayesian local spatial feature selection for spatial multimodal omics</text><text x="60" y="85" class="s">Partition tissue into contiguous domains, then select covariates or basis functions locally</text>
<rect x="55" y="125" width="365" height="610" rx="24" class="p"/><rect x="517" y="125" width="365" height="610" rx="24" class="p"/><rect x="980" y="125" width="365" height="610" rx="24" class="p"/>
<text x="90" y="165" class="h">Spatial multimodal input</text><text x="90" y="195" class="s">Features vary by tissue location</text><path d="M105 285C160 230 275 238 315 310C355 382 292 468 195 462C105 456 62 372 82 315C88 300 95 290 105 285Z" fill="#eef7eb" stroke="#c4d9bd" stroke-width="2"/><circle cx="130" cy="330" r="9" fill="#4f7bd9"/><circle cx="175" cy="305" r="9" fill="#f28e2b"/><circle cx="220" cy="322" r="9" fill="#4f7bd9"/><circle cx="270" cy="360" r="9" fill="#59a14f"/><circle cx="150" cy="390" r="9" fill="#f28e2b"/><circle cx="225" cy="420" r="9" fill="#59a14f"/><text x="105" y="545" class="m">Y(s), X_1(s), X_2(s), bases(s)</text><text x="105" y="575" class="t">multimodal covariates and spatial functions</text>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Bayesian prior</text><text x="552" y="195" class="s">Random contiguous domain partition</text><g transform="translate(555 255)"><path d="M25 55C82 5 200 8 250 70C305 138 250 235 145 240C60 244-15 158 25 55Z" class="z1" stroke="#8aa7d8" stroke-width="2"/><path d="M120 25C190 35 255 90 245 165C185 160 140 120 110 70C110 50 115 35 120 25Z" class="z2" stroke="#e0a45e" stroke-width="2"/><path d="M65 150C115 185 175 185 245 165C225 220 185 242 145 240C95 238 72 205 65 150Z" class="z3" stroke="#8fbd8f" stroke-width="2"/><text x="10" y="305" class="m">unknown K, flexible shapes</text><text x="10" y="337" class="t">partition prior + local feature-selection prior</text><rect x="15" y="385" width="60" height="28" rx="6" class="sel"/><rect x="90" y="385" width="60" height="28" rx="6" class="off"/><rect x="165" y="385" width="60" height="28" rx="6" class="sel"/><text x="15" y="450" class="m">gamma_kj in {0,1}</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">Output</text><text x="1015" y="195" class="s">Region-specific selected drivers</text><g transform="translate(1035 255)"><rect x="0" y="0" width="260" height="100" rx="16" class="z1" stroke="#8aa7d8"/><text x="22" y="35" class="m">domain A: X1 + basis3</text><path d="M25 75C70 38 130 86 210 45" class="cov"/><rect x="0" y="145" width="260" height="100" rx="16" class="z2" stroke="#e0a45e"/><text x="22" y="180" class="m">domain B: X2</text><path d="M25 220C80 210 130 165 210 200" class="basis"/><rect x="0" y="290" width="260" height="100" rx="16" class="z3" stroke="#8fbd8f"/><text x="22" y="325" class="m">domain C: local bases</text><path d="M25 360C70 335 150 380 220 330" class="cov"/><text x="0" y="460" class="t">Interpretation: feature relevance is local, not global.</text></g>
