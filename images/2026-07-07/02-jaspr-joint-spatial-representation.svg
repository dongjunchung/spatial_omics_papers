<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">JASPR technical visual abstract</title>
  <desc id="desc">Detailed schematic of JASPR showing paired histology and spatial transcriptomics neighborhoods, shared spatial modules, modality-specific experts, cross-modal reconstruction, virtual gene prediction, and clinical prognostic use.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaff}.panel{fill:#fff;stroke:#d8d1ef;stroke-width:2}.subpanel{fill:#f8f6ff;stroke:#ddd8f1;stroke-width:1.6}.title{font:700 30px Arial,sans-serif;fill:#201b35}.subtitle{font:600 17px Arial,sans-serif;fill:#4b4662}.head{font:700 20px Arial,sans-serif;fill:#241d3b}.label{font:14px Arial,sans-serif;fill:#302b43}.small{font:12px Arial,sans-serif;fill:#625c77}.mono{font:15px Consolas,monospace;fill:#2b2543}.arrow{stroke:#6a5acd;stroke-width:3;fill:none;marker-end:url(#arrow)}.thin{stroke:#a99ee7;stroke-width:2;fill:none}.dash{stroke:#a99ee7;stroke-width:2;stroke-dasharray:6 5;fill:none}.he{fill:#f2d3d8;stroke:#be8792;stroke-width:2}.st{fill:#d9e7ff;stroke:#7da3de;stroke-width:2}.shared{fill:#7b68ee}.expert{fill:#ffd166;stroke:#9a7500;stroke-width:2}.out{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}.loss{fill:#fff3e6;stroke:#d49a52;stroke-width:2}.gene{fill:#4f7bd9}.morph{fill:#d94f70}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#6a5acd"/></marker>
    <linearGradient id="latent" x1="0" x2="1"><stop offset="0" stop-color="#7b68ee"/><stop offset="1" stop-color="#58b6a4"/></linearGradient>
  </defs>
  <rect width="1600" height="980" class="bg"/>
  <text x="60" y="56" class="title">JASPR: joint spatial representation learning of histology and spatial genomics</text>
  <text x="60" y="86" class="subtitle">Paper-specific mechanism: spatial context, shared modules, modality experts, and cross-modal reconstruction</text>

  <rect x="55" y="125" width="405" height="760" rx="24" class="panel"/>
  <rect x="495" y="125" width="610" height="760" rx="24" class="panel"/>
  <rect x="1140" y="125" width="405" height="760" rx="24" class="panel"/>

  <text x="90" y="165" class="head">1. Co-registered local neighborhoods</text>
  <text x="90" y="193" class="subtitle">Histology window plus ST profile field</text>
  <g transform="translate(92 240)">
    <path d="M35 90 C102 20 270 30 332 128 C392 225 294 345 155 330 C55 320 -20 195 35 90 Z" class="he"/>
    <rect x="65" y="86" width="58" height="58" rx="10" fill="#f8e2e6" stroke="#be8792"/>
    <rect x="135" y="72" width="58" height="58" rx="10" fill="#f8e2e6" stroke="#be8792"/>
    <rect x="205" y="104" width="58" height="58" rx="10" fill="#f8e2e6" stroke="#be8792"/>
    <rect x="100" y="170" width="58" height="58" rx="10" fill="#f8e2e6" stroke="#be8792"/>
    <rect x="175" y="185" width="58" height="58" rx="10" fill="#f8e2e6" stroke="#be8792"/>
    <circle cx="95" cy="115" r="13" class="st"/><circle cx="165" cy="101" r="13" class="st"/><circle cx="236" cy="132" r="13" class="st"/>
    <circle cx="130" cy="198" r="13" class="st"/><circle cx="205" cy="214" r="13" class="st"/><circle cx="268" cy="248" r="13" class="st"/>
  </g>
  <rect x="90" y="620" width="320" height="120" rx="16" class="subpanel"/>
  <text x="112" y="654" class="mono">paired spatial sample</text>
  <text x="112" y="682" class="label">H_i: morphology around location i</text>
  <text x="112" y="708" class="label">G_i: spatial-genomic vector at location i</text>
  <text x="112" y="734" class="small">Local neighborhoods, not isolated patches, feed the representation.</text>

  <path d="M465 505 C478 505 484 505 495 505" class="arrow"/>

  <text x="530" y="165" class="head">2. Self-supervised joint spatial representation</text>
  <text x="530" y="193" class="subtitle">Shared spatial structure separated from modality-specific information</text>
  <rect x="535" y="235" width="520" height="575" rx="22" class="subpanel"/>
  <g transform="translate(575 270)">
    <rect x="145" y="0" width="230" height="75" rx="16" class="shared"/>
    <text x="184" y="33" class="mono" fill="#fff">shared spatial module</text>
    <text x="190" y="58" class="small" fill="#fff">universal tissue organization</text>
    <rect x="0" y="155" width="190" height="82" rx="16" class="expert"/>
    <text x="33" y="190" class="mono">H&amp;E expert</text>
    <text x="25" y="216" class="small">morphology-specific residual</text>
    <rect x="330" y="155" width="190" height="82" rx="16" class="expert"/>
    <text x="365" y="190" class="mono">ST expert</text>
    <text x="360" y="216" class="small">genomics-specific residual</text>
    <path d="M220 75 L98 155" class="arrow"/>
    <path d="M300 75 L425 155" class="arrow"/>
    <circle cx="260" cy="310" r="58" fill="url(#latent)" opacity=".95"/>
    <text x="217" y="307" class="mono" fill="#fff">joint latent</text>
    <text x="233" y="330" class="small" fill="#fff">z_i</text>
    <path d="M95 237 C130 280 180 305 205 310" class="arrow"/>
    <path d="M425 237 C390 280 340 305 315 310" class="arrow"/>
    <rect x="40" y="430" width="200" height="74" rx="16" class="loss"/>
    <text x="63" y="462" class="mono">reconstruct H&amp;E</text>
    <text x="63" y="488" class="small">spatial morphology context</text>
    <rect x="280" y="430" width="200" height="74" rx="16" class="loss"/>
    <text x="306" y="462" class="mono">reconstruct ST</text>
    <text x="306" y="488" class="small">spatial genomics context</text>
    <path d="M240 350 L140 430" class="arrow"/>
    <path d="M280 350 L380 430" class="arrow"/>
    <text x="80" y="545" class="mono">L = L_HE_rec + L_ST_rec + spatial context terms</text>
  </g>

  <path d="M1110 505 C1122 505 1128 505 1140 505" class="arrow"/>

  <text x="1175" y="165" class="head">3. Downstream use</text>
  <text x="1175" y="193" class="subtitle">Virtual genomic screening and prognostication</text>
  <g transform="translate(1185 245)">
    <rect x="0" y="0" width="310" height="110" rx="18" class="out"/>
    <text x="25" y="38" class="mono">H&amp;E -> 9,248 genes</text>
    <rect x="25" y="60" width="80" height="14" rx="7" class="gene"/><rect x="112" y="60" width="52" height="14" rx="7" class="gene" opacity=".65"/><rect x="170" y="60" width="96" height="14" rx="7" class="gene" opacity=".85"/>
    <rect x="0" y="165" width="310" height="110" rx="18" fill="#f7ecff" stroke="#b99bdc"/>
    <text x="25" y="203" class="mono">joint tissue representation</text>
    <path d="M35 240 C90 195 160 270 255 218" stroke="#7b68ee" stroke-width="4" fill="none"/>
    <rect x="0" y="330" width="310" height="110" rx="18" fill="#fff3e6" stroke="#d49a52"/>
    <text x="25" y="368" class="mono">clinical outcome signal</text>
    <text x="25" y="396" class="small">reported prognostic value in breast cancer setting</text>
    <path d="M155 110 L155 165" class="arrow"/>
    <path d="M155 275 L155 330" class="arrow"/>
  </g>
  <rect x="1185" y="735" width="310" height="82" rx="16" class="subpanel"/>
  <text x="1208" y="768" class="mono">Interpretation</text>
  <text x="1208" y="794" class="small">The central object is a spatially contextual latent state,</text>
  <text x="1208" y="814" class="small">not a simple concatenation of image and gene features.</text>
</svg>
