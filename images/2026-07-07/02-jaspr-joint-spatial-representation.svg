<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fcfbff}.p{fill:#fff;stroke:#e2dff0;stroke-width:2}.h{font:700 25px Arial;fill:#201b35}.s{font:600 16px Arial;fill:#4b4662}.t{font:14px Arial;fill:#302b43}.m{font:16px Consolas;fill:#2b2543}.a{stroke:#6a5acd;stroke-width:3;fill:none;marker-end:url(#ar)}.he{fill:#f3d7da;stroke:#c98f98;stroke-width:2}.st{fill:#d9e7ff;stroke:#7da3de;stroke-width:2}.shared{fill:#7b68ee}.spec{fill:#ffd166;stroke:#9a7500;stroke-width:2}.out{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6a5acd"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">JASPR: joint spatial representation of histology and spatial genomics</text><text x="60" y="85" class="s">Self-supervised cross-modal reconstruction with shared spatial modules and modality-specific experts</text>
<rect x="55" y="125" width="365" height="610" rx="24" class="p"/><rect x="517" y="125" width="365" height="610" rx="24" class="p"/><rect x="980" y="125" width="365" height="610" rx="24" class="p"/>
<text x="90" y="165" class="h">Paired local context</text><text x="90" y="195" class="s">H&amp;E patches and ST profiles</text><g transform="translate(105 255)"><path d="M25 70C90 8 230 20 275 105C320 190 245 285 130 270C45 260-20 150 25 70Z" class="he"/><circle cx="72" cy="102" r="18" class="st"/><circle cx="130" cy="86" r="18" class="st"/><circle cx="190" cy="120" r="18" class="st"/><circle cx="100" cy="168" r="18" class="st"/><circle cx="166" cy="178" r="18" class="st"/><circle cx="225" cy="212" r="18" class="st"/><text x="20" y="335" class="m">local tissue window</text><text x="20" y="365" class="t">morphology and spatial genomics are aligned by location</text></g>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Representation model</text><text x="552" y="195" class="s">Shared spatial core plus modality experts</text><g transform="translate(560 245)"><rect x="80" y="0" width="190" height="70" rx="16" class="shared"/><text x="115" y="43" class="m" fill="#fff">shared spatial module</text><rect x="0" y="150" width="145" height="70" rx="16" class="spec"/><text x="28" y="193" class="m">H&amp;E expert</text><rect x="205" y="150" width="145" height="70" rx="16" class="spec"/><text x="235" y="193" class="m">ST expert</text><path d="M145 70L80 150" class="a"/><path d="M205 70L278 150" class="a"/><rect x="42" y="305" width="270" height="72" rx="16" fill="#eef4ff" stroke="#9db6e4"/><text x="75" y="348" class="m">cross-modal reconstruction</text><path d="M72 220L110 305" class="a"/><path d="M278 220L235 305" class="a"/><text x="42" y="440" class="t">Objective preserves spatial context while separating shared and modality-specific signals.</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">Use cases</text><text x="1015" y="195" class="s">Virtual genomics and prognosis</text><g transform="translate(1035 265)"><rect x="0" y="0" width="260" height="80" rx="16" class="out"/><text x="35" y="47" class="m">predict 9,248 genes</text><rect x="0" y="130" width="260" height="80" rx="16" fill="#f7ecff" stroke="#b99bdc"/><text x="38" y="177" class="m">joint latent tissue state</text><rect x="0" y="260" width="260" height="80" rx="16" fill="#fff3e2" stroke="#c6a87e"/><text x="55" y="307" class="m">clinical prognosis</text><path d="M130 80L130 130" class="a"/><path d="M130 210L130 260" class="a"/></g>
</svg>
