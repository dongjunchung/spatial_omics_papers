<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Segmentation uncertainty in spatially resolved transcriptomics</title>
  <desc id="desc">A schematic showing transcripts and morphology passing through uncertain cell segmentation, then propagating into downstream cell types, niches and interactions.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbf7}.panel{fill:#fff;stroke:#24323d;stroke-width:2}.h{font:700 25px Arial,sans-serif;fill:#17232c}.t{font:18px Arial,sans-serif;fill:#24323d}.s{font:15px Arial,sans-serif;fill:#52616b}.arrow{stroke:#24323d;stroke-width:3;fill:none;marker-end:url(#a)}.rna{fill:#4f83cc}.cell{fill:#e8f4ff;stroke:#4f83cc;stroke-width:2}.warn{fill:#fff4df;stroke:#c47a00;stroke-width:2}.out{fill:#e9f7ee;stroke:#2e7d32;stroke-width:2}.bad{fill:#fdebed;stroke:#b95068;stroke-width:2}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#24323d"/></marker>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <rect class="panel" x="45" y="55" width="280" height="560" rx="22"/>
  <rect class="panel" x="460" y="55" width="280" height="560" rx="22"/>
  <rect class="panel" x="875" y="55" width="280" height="560" rx="22"/>
  <text class="h" x="80" y="105">Raw SRT evidence</text>
  <text class="h" x="495" y="105">Boundary assignment</text>
  <text class="h" x="910" y="105">Model consequences</text>
  <g>
    <path d="M105 175 C155 120 255 150 250 225 C246 300 135 305 95 245 C75 215 82 190 105 175 Z" class="cell"/>
    <path d="M130 355 C190 305 285 345 270 430 C252 520 120 500 100 420 C93 390 105 370 130 355 Z" class="cell"/>
    <g class="rna"><circle cx="130" cy="190" r="6"/><circle cx="175" cy="210" r="6"/><circle cx="222" cy="235" r="6"/><circle cx="145" cy="260" r="6"/><circle cx="190" cy="385" r="6"/><circle cx="235" cy="410" r="6"/><circle cx="140" cy="440" r="6"/><circle cx="255" cy="485" r="6"/></g>
    <text class="t" x="90" y="555">morphology + transcripts</text>
  </g>
  <path class="arrow" d="M330 335 L455 335"/>
  <g>
    <path class="warn" d="M525 165 C590 120 680 165 665 240 C650 315 540 300 515 240 C500 205 505 182 525 165 Z"/>
    <path d="M535 170 C560 250 620 245 665 230" stroke="#c47a00" stroke-dasharray="8 7" stroke-width="4" fill="none"/>
    <path class="bad" d="M535 360 C610 305 705 355 680 450 C650 545 520 515 505 430 C500 395 512 375 535 360 Z"/>
    <path d="M515 425 C570 392 620 410 685 370" stroke="#b95068" stroke-dasharray="8 7" stroke-width="4" fill="none"/>
    <text class="t" x="510" y="555">sparse signal, displaced RNA, 3D-to-2D projection</text>
  </g>
  <path class="arrow" d="M745 335 L870 335"/>
  <g>
    <rect class="out" x="920" y="150" width="190" height="72" rx="14"/><text class="t" x="950" y="193">cell types</text>
    <rect class="out" x="920" y="265" width="190" height="72" rx="14"/><text class="t" x="950" y="308">niches</text>
    <rect class="out" x="920" y="380" width="190" height="72" rx="14"/><text class="t" x="950" y="423">interactions</text>
    <text class="s" x="920" y="520">benchmark metrics + reporting</text>
  </g>
  <text class="s" x="70" y="640">Digest interpretation: segmentation should expose uncertainty because its errors can masquerade as biological structure.</text>
</svg>
