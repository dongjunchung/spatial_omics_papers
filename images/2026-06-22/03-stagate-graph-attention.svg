<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">STAGATE adaptive graph attention</title>
  <desc id="desc">A spatial neighbor graph is encoded by attention so boundary edges can be downweighted while local spatial signal is denoised.</desc>
  <defs>
    <linearGradient id="tissue" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset=".5" stop-color="#fff7ed"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22313f"/></marker>
    <style>
      .bg{fill:#fbfbf7}.panel{fill:#fff;stroke:#22313f;stroke-width:2.2}.h{font:700 27px Arial,sans-serif;fill:#17232c}.t{font:19px Arial,sans-serif;fill:#24323d}.s{font:15px Arial,sans-serif;fill:#50616e}.xs{font:13px Arial,sans-serif;fill:#5f6f7a}.formula{font:700 16px "Courier New",monospace;fill:#17232c}.arrow{stroke:#22313f;stroke-width:3.4;fill:none;marker-end:url(#arrow)}.arrow2{stroke:#22313f;stroke-width:3;fill:none;marker-end:url(#arrow)}.chip{fill:#f8fbff;stroke:#2f80ed;stroke-width:2}.chip2{fill:#fff8ed;stroke:#f2994a;stroke-width:2}.chip3{fill:#f4fff6;stroke:#27ae60;stroke-width:2}.spot{opacity:.9}.a{fill:#2f80ed}.b{fill:#f2994a}.c{fill:#27ae60}.node{fill:#fff;stroke-width:2.4}.blue{stroke:#2f80ed}.orange{stroke:#f2994a}.green{stroke:#27ae60}.soft{stroke:#7b61ff;stroke-width:2.2;opacity:.58;fill:none}.edge{stroke:#34495e;stroke-width:2.1;opacity:.62;fill:none}.strong{stroke:#f2994a;stroke-width:4;opacity:.85}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <rect class="panel" x="45" y="55" width="375" height="650" rx="28"/>
  <rect class="panel" x="512" y="55" width="375" height="650" rx="28"/>
  <rect class="panel" x="980" y="55" width="375" height="650" rx="28"/>
  <text class="h" x="80" y="105">Spot graph</text>
  <text class="h" x="545" y="105">Attention autoencoder</text>
  <text class="h" x="1015" y="105">Domain embedding</text>
  <g transform="translate(82 150)">
    <path d="M38 70 C96 5 225 12 290 65 C365 126 300 235 202 252 C106 268 20 208 22 130 C23 101 27 82 38 70 Z" fill="url(#tissue)" stroke="#2f80ed" stroke-width="3"/>
    <path d="M58 145 C112 88 205 92 300 145" stroke="#f2994a" stroke-width="6" fill="none" opacity=".78"/>
    <path d="M72 198 C128 165 205 175 280 218" stroke="#27ae60" stroke-width="5" fill="none" opacity=".7"/>
    <circle class="spot a" cx="72" cy="112" r="8"/><circle class="spot b" cx="136" cy="82" r="8"/><circle class="spot c" cx="218" cy="104" r="8"/>
    <circle class="spot a" cx="285" cy="154" r="8"/><circle class="spot b" cx="122" cy="190" r="8"/><circle class="spot c" cx="220" cy="210" r="8"/>
  </g>
  <g><rect x="92" y="435" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="110" y="435" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="128" y="435" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="146" y="435" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="164" y="435" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="182" y="435" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="92" y="453" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="110" y="453" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="128" y="453" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="146" y="453" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="164" y="453" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="182" y="453" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="92" y="471" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="110" y="471" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="128" y="471" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="146" y="471" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="164" y="471" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="182" y="471" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="92" y="489" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="110" y="489" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="128" y="489" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="146" y="489" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="164" y="489" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="182" y="489" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="92" y="507" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="110" y="507" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="128" y="507" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="146" y="507" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="164" y="507" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="182" y="507" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><text class="xs" x="92" y="543">spots x features</text></g>
  <text class="s" x="210" y="465">spot expression</text>
<text class="s" x="210" y="489">spatial neighbor network</text>
<text class="s" x="210" y="513">optional graph pruning</text>
  <path class="arrow" d="M424 380 C462 380 475 380 507 380"/>
  <g transform="translate(555 150)">
      <text class="t" x="0" y="0">learned graph structure</text>
      <circle class="node blue" cx="28" cy="62" r="15"/><circle class="node blue" cx="118" cy="30" r="15"/><circle class="node blue" cx="205" cy="74" r="15"/><circle class="node blue" cx="72" cy="150" r="15"/><circle class="node blue" cx="180" cy="165" r="15"/>
      <path class="edge" d="M28 62 L118 30 L205 74 L180 165 L72 150 L28 62 M118 30 L72 150 M205 74 L72 150"/>
      <path class="edge strong" d="M28 62 L180 165 M118 30 L205 74"/>
      <text class="formula" x="0" y="225">h_i&apos; = attention-weighted sum over neighbors</text>
    </g>
  <rect class="chip2" x="545" y="520" width="290" height="58" rx="16"/>
  <text class="t" x="565" y="553">adaptive edges</text>
  <text class="xs" x="565" y="579">learn which neighbors matter</text>
  <rect class="chip3" x="545" y="600" width="290" height="58" rx="16"/>
  <text class="t" x="565" y="633">autoencoder</text>
  <text class="xs" x="565" y="659">denoise through graph latent space</text>
  <path class="arrow" d="M892 380 C930 380 945 380 975 380"/>
  <g transform="translate(1015 155)">
    <g transform="translate(0 0)">
    <path d="M38 70 C96 5 225 12 290 65 C365 126 300 235 202 252 C106 268 20 208 22 130 C23 101 27 82 38 70 Z" fill="url(#tissue)" stroke="#27ae60" stroke-width="3"/>
    <path d="M58 145 C112 88 205 92 300 145" stroke="#f2994a" stroke-width="6" fill="none" opacity=".78"/>
    <path d="M72 198 C128 165 205 175 280 218" stroke="#27ae60" stroke-width="5" fill="none" opacity=".7"/>
    <circle class="spot a" cx="72" cy="112" r="8"/><circle class="spot b" cx="136" cy="82" r="8"/><circle class="spot c" cx="218" cy="104" r="8"/>
    <circle class="spot a" cx="285" cy="154" r="8"/><circle class="spot b" cx="122" cy="190" r="8"/><circle class="spot c" cx="220" cy="210" r="8"/>
  </g>
    <rect class="chip3" x="5" y="315" width="300" height="72" rx="16"/>
  <text class="t" x="25" y="348">spatial domains</text>
  <text class="xs" x="25" y="374">boundary-aware clusters</text>
    <rect class="chip" x="5" y="410" width="300" height="72" rx="16"/>
  <text class="t" x="25" y="443">denoised expression</text>
  <text class="xs" x="25" y="469">smoothed gene profiles</text>
    <rect class="chip2" x="5" y="505" width="300" height="72" rx="16"/>
  <text class="t" x="25" y="538">3D section analysis</text>
  <text class="xs" x="25" y="564">multi-section structure</text>
  </g>
  <text class="s" x="70" y="775">STAGATE&apos;s core is learnable neighbor influence at tissue boundaries.</text>
</svg>
