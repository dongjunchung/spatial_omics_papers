<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">FEAST dense signed attention</title>
  <desc id="desc">Histology regions are connected by fully connected positive and negative attention for spatial gene-expression prediction.</desc>
  <defs>
    <linearGradient id="tissue" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset=".5" stop-color="#fff7ed"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22313f"/></marker>
    <style>
      .bg{fill:#fbfbf7}.panel{fill:#fff;stroke:#22313f;stroke-width:2.2}.h{font:700 27px Arial,sans-serif;fill:#17232c}.t{font:19px Arial,sans-serif;fill:#24323d}.s{font:15px Arial,sans-serif;fill:#50616e}.xs{font:13px Arial,sans-serif;fill:#5f6f7a}.formula{font:700 16px "Courier New",monospace;fill:#17232c}.arrow{stroke:#22313f;stroke-width:3.4;fill:none;marker-end:url(#arrow)}.arrow2{stroke:#22313f;stroke-width:3;fill:none;marker-end:url(#arrow)}.chip{fill:#f8fbff;stroke:#2f80ed;stroke-width:2}.chip2{fill:#fff8ed;stroke:#f2994a;stroke-width:2}.chip3{fill:#f4fff6;stroke:#27ae60;stroke-width:2}.spot{opacity:.9}.a{fill:#2f80ed}.b{fill:#f2994a}.c{fill:#27ae60}.node{fill:#fff;stroke-width:2.4}.blue{stroke:#2f80ed}.orange{stroke:#f2994a}.green{stroke:#27ae60}.soft{stroke:#7b61ff;stroke-width:2.2;opacity:.58;fill:none}.edge{stroke:#34495e;stroke-width:2.1;opacity:.62;fill:none}.strong{stroke:#f2994a;stroke-width:4;opacity:.85}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <rect class="panel" x="45" y="55" width="375" height="650" rx="28"/>
  <rect class="panel" x="512" y="55" width="375" height="650" rx="28"/>
  <rect class="panel" x="980" y="55" width="375" height="650" rx="28"/>
  <text class="h" x="80" y="105">Image regions</text>
  <text class="h" x="545" y="105">Signed dense attention</text>
  <text class="h" x="1015" y="105">Predicted genes</text>
  <g transform="translate(82 150)">
    <path d="M38 70 C96 5 225 12 290 65 C365 126 300 235 202 252 C106 268 20 208 22 130 C23 101 27 82 38 70 Z" fill="url(#tissue)" stroke="#2f80ed" stroke-width="3"/>
    <path d="M58 145 C112 88 205 92 300 145" stroke="#f2994a" stroke-width="6" fill="none" opacity=".78"/>
    <path d="M72 198 C128 165 205 175 280 218" stroke="#27ae60" stroke-width="5" fill="none" opacity=".7"/>
    <circle class="spot a" cx="72" cy="112" r="8"/><circle class="spot b" cx="136" cy="82" r="8"/><circle class="spot c" cx="218" cy="104" r="8"/>
    <circle class="spot a" cx="285" cy="154" r="8"/><circle class="spot b" cx="122" cy="190" r="8"/><circle class="spot c" cx="220" cy="210" r="8"/>
  </g>
  <g><rect x="92" y="435" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="110" y="435" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="128" y="435" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="146" y="435" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="164" y="435" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="182" y="435" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="92" y="453" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="110" y="453" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="128" y="453" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="146" y="453" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="164" y="453" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="182" y="453" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="92" y="471" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="110" y="471" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="128" y="471" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="146" y="471" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="164" y="471" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="182" y="471" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="92" y="489" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="110" y="489" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="128" y="489" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="146" y="489" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="164" y="489" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="182" y="489" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="92" y="507" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><rect x="110" y="507" width="16" height="16" fill="#dbeafe" stroke="#fff"/><rect x="128" y="507" width="16" height="16" fill="#bfdbfe" stroke="#fff"/><rect x="146" y="507" width="16" height="16" fill="#93c5fd" stroke="#fff"/><rect x="164" y="507" width="16" height="16" fill="#fef3c7" stroke="#fff"/><rect x="182" y="507" width="16" height="16" fill="#bbf7d0" stroke="#fff"/><text class="xs" x="92" y="543">all region pairs</text></g>
  <text class="s" x="210" y="465">spot-centered patches</text>
<text class="s" x="210" y="489">off-grid image context</text>
<text class="s" x="210" y="513">spatial gene labels</text>
  <path class="arrow" d="M424 380 C462 380 475 380 507 380"/>
  <g transform="translate(555 150)">
      <text class="t" x="0" y="0">image-gene alignment</text>
      <rect class="chip" x="0" y="30" width="105" height="82" rx="12"/><path d="M18 88 C45 45 72 54 92 70" stroke="#d45087" stroke-width="5" fill="none"/><text class="xs" x="18" y="58">H&amp;E</text>
      <rect class="chip2" x="150" y="30" width="105" height="82" rx="12"/><path d="M168 92 L184 52 L202 78 L222 44 L240 95" stroke="#2f80ed" stroke-width="5" fill="none"/><text class="xs" x="168" y="58">ST</text>
      <path class="soft" d="M105 70 C130 34 148 34 150 70 M105 86 C130 122 148 122 150 86"/>
      <text class="formula" x="0" y="180">attention_ij can be positive or negative</text>
    </g>
  <rect class="chip2" x="545" y="520" width="290" height="58" rx="16"/>
  <text class="t" x="565" y="553">fully connected graph</text>
  <text class="xs" x="565" y="579">no fixed sparse neighborhood</text>
  <rect class="chip3" x="545" y="600" width="290" height="58" rx="16"/>
  <text class="t" x="565" y="633">negative-aware attention</text>
  <text class="xs" x="565" y="659">inhibitory/excitatory relations</text>
  <path class="arrow" d="M892 380 C930 380 945 380 975 380"/>
  <g transform="translate(1015 155)">
    <g transform="translate(0 0)">
    <path d="M38 70 C96 5 225 12 290 65 C365 126 300 235 202 252 C106 268 20 208 22 130 C23 101 27 82 38 70 Z" fill="url(#tissue)" stroke="#27ae60" stroke-width="3"/>
    <path d="M58 145 C112 88 205 92 300 145" stroke="#f2994a" stroke-width="6" fill="none" opacity=".78"/>
    <path d="M72 198 C128 165 205 175 280 218" stroke="#27ae60" stroke-width="5" fill="none" opacity=".7"/>
    <circle class="spot a" cx="72" cy="112" r="8"/><circle class="spot b" cx="136" cy="82" r="8"/><circle class="spot c" cx="218" cy="104" r="8"/>
    <circle class="spot a" cx="285" cy="154" r="8"/><circle class="spot b" cx="122" cy="190" r="8"/><circle class="spot c" cx="220" cy="210" r="8"/>
  </g>
    <rect class="chip3" x="5" y="315" width="300" height="72" rx="16"/>
  <text class="t" x="25" y="348">gene maps</text>
  <text class="xs" x="25" y="374">predicted expression surfaces</text>
    <rect class="chip" x="5" y="410" width="300" height="72" rx="16"/>
  <text class="t" x="25" y="443">attention interactions</text>
  <text class="xs" x="25" y="469">interpretable signed links</text>
    <rect class="chip2" x="5" y="505" width="300" height="72" rx="16"/>
  <text class="t" x="25" y="538">long-range context</text>
  <text class="xs" x="25" y="564">context beyond local patches</text>
  </g>
  <text class="s" x="70" y="775">FEAST is about dense signed image-context interactions, so the diagram shows all-to-all attention rather than local boxes.</text>
</svg>
