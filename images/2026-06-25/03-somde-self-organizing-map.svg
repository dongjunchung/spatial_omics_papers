<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fbfcf8}.p{fill:#fff;stroke:#dfe7d8;stroke-width:2}.h{font:700 25px Arial;fill:#172817}.s{font:600 16px Arial;fill:#485f46}.t{font:14px Arial;fill:#2d3d2a}.m{font:16px Consolas;fill:#243b23}.a{stroke:#57824a;stroke-width:3;fill:none;marker-end:url(#ar)}.spot{fill:#79aee3;opacity:.62}.edge{stroke:#b5c9ad;stroke-width:2}.hot{fill:#e76f51}.cool{fill:#72b7b2}.mid{fill:#f4d35e}.ln{stroke:#496c42;stroke-width:3;fill:none}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#57824a"/></marker></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">SOMDE: scalable SVG detection with a self-organizing map</text><text x="60" y="85" class="s">Compress many spatial observations into representative nodes, then test genes on the scaffold</text>
