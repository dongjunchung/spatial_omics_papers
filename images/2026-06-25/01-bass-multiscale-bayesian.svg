<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#f8fbff}.p{fill:#fff;stroke:#d8e2f0;stroke-width:2}.h{font:700 25px Arial;fill:#13223a}.s{font:600 16px Arial;fill:#405168}.t{font:14px Arial;fill:#27364a}.m{font:16px Consolas;fill:#20324d}.a{stroke:#476fba;stroke-width:3;fill:none;marker-end:url(#ar)}.d{stroke:#7f8da3;stroke-width:2;stroke-dasharray:6 6;fill:none}.e{stroke:#8aa7d8;stroke-width:2;fill:none}.A{fill:#4f7bd9}.B{fill:#f28e2b}.C{fill:#59a14f}.D{fill:#b07aa1}.z1{fill:#d7e7ff}.z2{fill:#ffe5c4}.z3{fill:#dff1df}.z4{fill:#eadcf0}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#476fba"/></marker></defs>
<rect class="bg" width="1400" height="820"/><text x="60" y="55" class="h">BASS: Bayesian multi-scale, multi-sample spatial modeling</text><text x="60" y="85" class="s">Jointly infer cell-type labels and tissue-domain labels rather than clustering first and smoothing later</text>
