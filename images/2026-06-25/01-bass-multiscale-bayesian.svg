<rect x="315" y="370" width="70" height="125" rx="12" fill="#f4f7fc" stroke="#c8d5e6"/><text x="333" y="398" class="t">genes</text><rect x="335" y="420" width="8" height="55" class="A"/><rect x="350" y="440" width="8" height="35" class="B"/><rect x="365" y="405" width="8" height="70" class="C"/>
