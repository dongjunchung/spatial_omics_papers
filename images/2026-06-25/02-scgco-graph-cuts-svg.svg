<text x="90" y="165" class="h">Input gene</text><text x="90" y="195" class="s">Expression on spatial coordinates</text><text x="90" y="222" class="t">A candidate gene forms a pattern across cells/spots.</text>
<g transform="translate(100 270)"><path d="M18 60C66 11 150 3 214 39C279 75 296 148 252 207C210 265 101 269 44 221C-5 180-18 99 18 60Z" fill="#eef4fb" stroke="#cbd8e8" stroke-width="2"/><circle cx="48" cy="85" r="14" class="low"/><circle cx="92" cy="58" r="14" class="low"/><circle cx="137" cy="55" r="14" class="mid"/><circle cx="181" cy="80" r="14" class="high"/><circle cx="225" cy="118" r="14" class="high"/><circle cx="49" cy="137" r="14" class="low"/><circle cx="97" cy="123" r="14" class="mid"/><circle cx="147" cy="119" r="14" class="high"/><circle cx="194" cy="151" r="14" class="high"/><circle cx="76" cy="186" r="14" class="low"/><circle cx="129" cy="188" r="14" class="mid"/><circle cx="185" cy="205" r="14" class="mid"/><rect x="20" y="300" width="250" height="18" rx="9" fill="url(#g)"/><text x="20" y="340" class="t">low expression</text><text x="185" y="340" class="t">high expression</text></g>
<path d="M430 425C465 425 480 425 515 425" class="a"/>
<text x="552" y="165" class="h">Graph-cut HMRF</text><text x="552" y="195" class="s">Mixture states plus spatial smoothness</text>
<g transform="translate(565 245)"><text x="0" y="0" class="t">neighbor graph and hidden labels L</text><line x1="55" y1="72" x2="117" y2="50" class="edge"/><line x1="117" y1="50" x2="182" y2="76" class="edge"/><line x1="55" y1="72" x2="76" y2="135" class="edge"/><line x1="117" y1="50" x2="129" y2="124" class="edge"/><line x1="182" y1="76" x2="202" y2="146" class="edge"/><line x1="76" y1="135" x2="129" y2="124" class="edge"/><line x1="129" y1="124" x2="202" y2="146" class="edge"/><line x1="76" y1="135" x2="111" y2="198" class="edge"/><line x1="129" y1="124" x2="111" y2="198" class="edge"/><line x1="202" y1="146" x2="170" y2="213" class="edge"/><line x1="111" y1="198" x2="170" y2="213" class="edge"/><circle cx="55" cy="72" r="17" class="l0"/><circle cx="117" cy="50" r="17" class="l0"/><circle cx="182" cy="76" r="17" class="l2"/><circle cx="76" cy="135" r="17" class="l0"/><circle cx="129" cy="124" r="17" class="l1"/><circle cx="202" cy="146" r="17" class="l2"/><circle cx="111" cy="198" r="17" class="l1"/><circle cx="170" cy="213" r="17" class="l1"/><path d="M149 45C147 92 154 134 193 182" class="cut"/><text x="5" y="290" class="m">min_L data_fit(Y,L) + beta * neighbor_penalty(L)</text><text x="5" y="323" class="t">Graph cuts search for the label map with expression support</text><text x="5" y="348" class="t">and coherent neighbors; beta is tuned from signal-to-noise.</text></g>
<g transform="translate(690 610)"><rect x="0" y="0" width="90" height="28" rx="7" class="l0"/><text x="105" y="20" class="t">mixture state 0</text><rect x="0" y="42" width="90" height="28" rx="7" class="l1"/><text x="105" y="62" class="t">state 1</text><rect x="0" y="84" width="90" height="28" rx="7" class="l2"/><text x="105" y="104" class="t">state 2</text></g>
<path d="M890 425C925 425 940 425 975 425" class="a"/>
<text x="1015" y="165" class="h">SVG output</text><text x="1015" y="195" class="s">Regional signal, not scattered spots</text>
<g transform="translate(1025 255)"><path d="M20 62C67 13 152 8 217 42C282 76 299 148 253 208C209 264 99 267 45 221C-4 180-18 100 20 62Z" fill="#f8fbff" stroke="#cbd8e8" stroke-width="2"/><path d="M143 31C199 53 245 98 249 157C210 165 171 150 145 119C126 96 119 60 143 31Z" class="high" opacity=".82" stroke="#173a78" stroke-width="2"/><path d="M60 73C91 63 126 70 146 118C122 156 91 177 54 160C31 129 34 96 60 73Z" class="mid" opacity=".85" stroke="#5d8bcc" stroke-width="2"/><path d="M65 189C117 205 165 203 205 185" class="cut" opacity=".65"/><text x="20" y="292" class="m">gene g: spatially variable</text><text x="20" y="325" class="t">Positive call requires graph-supported structure</text><text x="20" y="350" class="t">under the optimized HMRF label field.</text></g>
<rect x="1025" y="620" width="285" height="78" rx="14" fill="#f4f7fc" stroke="#c8d5e6"/><text x="1045" y="653" class="t">Good fit for layers, boundaries,</text><text x="1045" y="678" class="t">localized niches, and sharp tissue regions.</text>
