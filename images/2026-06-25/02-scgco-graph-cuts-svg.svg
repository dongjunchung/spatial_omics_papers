<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><style>.bg{fill:#fbfbff}.p{fill:#fff;stroke:#dde3ef;stroke-width:2}.h{font:700 25px Arial;fill:#152238}.s{font:600 16px Arial;fill:#41536a}.t{font:14px Arial;fill:#28384d}.m{font:16px Consolas;fill:#243450}.a{stroke:#4d72b8;stroke-width:3;fill:none;marker-end:url(#ar)}.edge{stroke:#aebbd0;stroke-width:2}.cut{stroke:#d64b4b;stroke-width:5;stroke-linecap:round}.low{fill:#d9e7ff}.mid{fill:#8fb4ea}.high{fill:#244f9e}.l0{fill:#f2d4a7}.l1{fill:#9ac7ea}.l2{fill:#db7f67}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#4d72b8"/></marker><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#d9e7ff"/><stop offset=".55" stop-color="#8fb4ea"/><stop offset="1" stop-color="#244f9e"/></linearGradient></defs>
<rect width="1400" height="820" class="bg"/><text x="60" y="55" class="h">scGCO: spatially variable genes by HMRF graph cuts</text><text x="60" y="85" class="s">Detect coherent spatial expression regions by optimizing labels on a neighbor graph</text>
