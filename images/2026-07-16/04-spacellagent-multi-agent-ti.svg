<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#fffdf9}.p{fill:#fff;stroke:#eadfce;stroke-width:2}.sp{fill:#fffaf3;stroke:#eadfce;stroke-width:1.6}.ti{font:700 30px Arial;fill:#332212}.su{font:600 17px Arial;fill:#65513b}.h{font:700 20px Arial;fill:#3b2815}.t{font:14px Arial;fill:#3f3020}.sm{font:12px Arial;fill:#6f604e}.m{font:15px Consolas;fill:#372817}.a{stroke:#b56b21;stroke-width:3;fill:none;marker-end:url(#ar)}.agent{fill:#fff3e2;stroke:#d49a52;stroke-width:2}.data{fill:#d7e7ff;stroke:#8aa7d8;stroke-width:2}.eval{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}.warn{fill:#eadcf0;stroke:#bd9bcc;stroke-width:2}.edge{stroke:#b56b21;stroke-width:2;fill:none}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b56b21"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="60" y="56" class="ti">SpaCellAgent: agentic workflow automation for trajectory analysis</text><text x="60" y="86" class="su">Natural-language request -> multi-agent planning -> adaptive tool orchestration -> execution, evaluation, and report generation</text><rect x="55" y="125" width="405" height="760" rx="24" class="p"/><rect x="495" y="125" width="610" height="760" rx="24" class="p"/><rect x="1140" y="125" width="405" height="760" rx="24" class="p"/><text x="90" y="165" class="h">1. Analysis inputs</text><text x="90" y="193" class="su">Single-cell and spatial transcriptomics</text><g transform="translate(95 250)"><rect x="0" y="0" width="310" height="110" rx="18" class="data"/><text x="25" y="38" class="m">natural-language task</text><text x="25" y="68" class="sm">trajectory, spatiotemporal dynamics, narrative</text><rect x="0" y="165" width="310" height="110" rx="18" class="data"/><text x="25" y="203" class="m">datasets</text><text x="25" y="233" class="sm">single-cell, spatially resolved tissue, time courses</text><path d="M45 390C100 330 180 425 260 350" stroke="#4f7bd9" stroke-width="4" fill="none"/><circle cx="45" cy="390" r="9" fill="#4f7bd9"/><circle cx="100" cy="330" r="9" fill="#f28e2b"/><circle cx="180" cy="425" r="9" fill="#59a14f"/><circle cx="260" cy="350" r="9" fill="#d94f70"/><text x="25" y="500" class="m">target: trajectory inference</text></g><path d="M465 505C478 505 484 505 495 505" class="a"/><text x="530" y="165" class="h">2. Multi-agent system</text><text x="530" y="193" class="su">Planning, tool selection, execution, self-evolution</text><rect x="535" y="235" width="530" height="560" rx="22" class="sp"/><g transform="translate(565 275)"><rect x="0" y="0" width="150" height="70" rx="14" class="agent"/><text x="35" y="42" class="m">Planner</text><rect x="190" y="0" width="150" height="70" rx="14" class="agent"/><text x="216" y="42" class="m">ToolSelector</text><rect x="380" y="0" width="150" height="70" rx="14" class="agent"/><text x="402" y="42" class="m">Executor</text><path d="M150 35L190 35" class="a"/><path d="M340 35L380 35" class="a"/><rect x="0" y="135" width="240" height="88" rx="16" class="data"/><text x="25" y="170" class="m">adaptive algorithm choice</text><text x="25" y="198" class="sm">PAGA, DPT, Slingshot-like TI tools as selected pipeline elements</text><rect x="290" y="135" width="240" height="88" rx="16" class="eval"/><text x="315" y="170" class="m">evaluation feedback</text><text x="315" y="198" class="sm">expert alignment, retries, performance checks</text><path d="M240 179L290 179" class="a"/><path d="M410 223C370 285 180 285 100 223" class="edge" marker-end="url(#ar)"/><rect x="85" y="330" width="360" height="95" rx="16" class="warn"/><text x="110" y="365" class="m">self-evolution module</text><text x="110" y="395" class="sm">iteratively refines workflow through feedback</text><text x="110" y="420" class="sm">before final report generation</text></g><path d="M1110 505C1122 505 1128 505 1140 505" class="a"/><text x="1175" y="165" class="h">3. Output and caveat</text><text x="1175" y="193" class="su">Automated TI workflow plus narrative report</text><g transform="translate(1185 250)"><rect x="0" y="0" width="310" height="115" rx="18" class="eval"/><text x="25" y="38" class="m">optimized analysis workflow</text><text x="25" y="68" class="sm">natural-language specification to executable pipeline</text><rect x="0" y="170" width="310" height="115" rx="18" class="eval"/><text x="25" y="208" class="m">reported evaluation</text><text x="25" y="238" class="sm">six heterogeneous datasets; over 40% efficiency gain</text><rect x="0" y="350" width="310" height="145" rx="18" class="warn"/><text x="25" y="388" class="m">Watch point</text><text x="25" y="418" class="sm">Agentic convenience must be paired with provenance,</text><text x="25" y="443" class="sm">parameter audit trails, and biological validation.</text></g></svg>
