<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#fbfcf8}.p{fill:#fff;stroke:#d7e4cf;stroke-width:2}.sp{fill:#f8fbf5;stroke:#dce9d5;stroke-width:1.6}.ti{font:700 30px Arial;fill:#172817}.su{font:600 17px Arial;fill:#485f46}.h{font:700 20px Arial;fill:#1d3019}.t{font:14px Arial;fill:#2d3d2a}.sm{font:12px Arial;fill:#63725f}.m{font:15px Consolas;fill:#243b23}.a{stroke:#57824a;stroke-width:3;fill:none;marker-end:url(#ar)}.edge{stroke:#9abd91;stroke-width:2}.spot{fill:#eaf5e6;stroke:#78a76f;stroke-width:2}.ct1{fill:#4f7bd9}.ct2{fill:#f28e2b}.ct3{fill:#59a14f}.gene{fill:#d94f70}.lda{fill:#eef4ff;stroke:#9db6e4;stroke-width:2}.reg{fill:#fff3e2;stroke:#d49a52;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#57824a"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="60" y="56" class="ti">SpatialCD: spatially informed reference-free deconvolution</text><text x="60" y="86" class="su">LDA topic model over spots, augmented with kNN graph regularization and ADMM inference</text><rect x="55" y="125" width="405" height="760" rx="24" class="p"/><rect x="495" y="125" width="610" height="760" rx="24" class="p"/><rect x="1140" y="125" width="405" height="760" rx="24" class="p"/><text x="90" y="165" class="h">1. Inputs</text><text x="90" y="193" class="su">Expression matrix plus spatial coordinates</text><g transform="translate(105 250)"><path d="M35 90C104 20 270 30 330 128C390 225 294 345 155 330C55 320-20 195 35 90Z" fill="#eef7eb" stroke="#c4d9bd" stroke-width="2"/><circle cx="92" cy="112" r="18" class="spot"/><circle cx="157" cy="92" r="18" class="spot"/><circle cx="230" cy="130" r="18" class="spot"/><circle cx="118" cy="190" r="18" class="spot"/><circle cx="195" cy="206" r="18" class="spot"/><circle cx="262" cy="250" r="18" class="spot"/><line x1="92" y1="112" x2="157" y2="92" class="edge"/><line x1="157" y1="92" x2="230" y2="130" class="edge"/><line x1="118" y1="190" x2="195" y2="206" class="edge"/><line x1="195" y1="206" x2="262" y2="250" class="edge"/><line x1="92" y1="112" x2="118" y2="190" class="edge"/><line x1="230" y1="130" x2="195" y2="206" class="edge"/></g><rect x="95" y="610" width="310" height="120" rx="16" class="sp"/><text x="118" y="645" class="m">Y: spots x genes</text><text x="118" y="675" class="m">S: spots x coordinates</text><text x="118" y="705" class="sm">No matched scRNA-seq reference required.</text><path d="M465 505C478 505 484 505 495 505" class="a"/><text x="530" y="165" class="h">2. Spatial topic model</text><text x="530" y="193" class="su">Documents, topics, words, plus graph smoothness</text><rect x="535" y="235" width="530" height="250" rx="22" class="sp"/><g transform="translate(570 278)"><rect x="0" y="0" width="150" height="70" rx="14" class="lda"/><text x="25" y="42" class="m">spot document</text><rect x="190" y="0" width="150" height="70" rx="14" class="lda"/><text x="230" y="42" class="m">cell topics</text><rect x="380" y="0" width="100" height="70" rx="14" class="lda"/><text x="406" y="42" class="m">genes</text><path d="M150 35L190 35" class="a"/><path d="M340 35L380 35" class="a"/><text x="5" y="125" class="m">theta: spot x cell-type proportions</text><text x="5" y="155" class="m">beta: cell-type x gene profiles</text></g><rect x="535" y="530" width="530" height="260" rx="22" class="sp"/><g transform="translate(570 570)"><rect x="0" y="0" width="225" height="90" rx="16" class="reg"/><text x="22" y="35" class="m">kNN spatial graph</text><text x="22" y="62" class="sm">neighboring spots share similar theta</text><rect x="275" y="0" width="225" height="90" rx="16" class="reg"/><text x="297" y="35" class="m">ADMM optimization</text><text x="297" y="62" class="sm">regularized deconvolution problem</text><path d="M225 45C245 45 255 45 275 45" class="a"/><text x="0" y="145" class="m">min L_LDA(Y | theta,beta) + lambda * sum_(i,j in E)||theta_i-theta_j||</text><text x="0" y="190" class="sm">Also selects K and emphasizes overdispersed spatially informative genes.</text></g><path d="M1110 505C1122 505 1128 505 1140 505" class="a"/><text x="1175" y="165" class="h">3. Outputs</text><text x="1175" y="193" class="su">Reference-free tissue composition</text><g transform="translate(1185 250)"><path d="M35 90C104 20 270 30 330 128C390 225 294 345 155 330C55 320-20 195 35 90Z" fill="#f5f9ff" stroke="#c4d3ea" stroke-width="2"/><g><circle cx="92" cy="112" r="21" class="ct1"/><path d="M92 112L92 91A21 21 0 0 1 112 119Z" class="ct2"/><circle cx="157" cy="92" r="21" class="ct2"/><path d="M157 92L157 71A21 21 0 0 1 177 99Z" class="ct3"/><circle cx="230" cy="130" r="21" class="ct3"/><path d="M230 130L230 109A21 21 0 0 1 250 137Z" class="ct1"/><circle cx="118" cy="190" r="21" class="ct1"/><path d="M118 190L118 169A21 21 0 0 1 138 197Z" class="ct2"/><circle cx="195" cy="206" r="21" class="ct2"/><path d="M195 206L195 185A21 21 0 0 1 215 213Z" class="ct3"/><circle cx="262" cy="250" r="21" class="ct3"/><path d="M262 250L262 229A21 21 0 0 1 282 257Z" class="ct1"/></g><rect x="0" y="405" width="315" height="110" rx="16" class="sp"/><text x="20" y="440" class="m">cell-type proportions theta</text><text x="20" y="468" class="m">gene profiles beta</text><text x="20" y="496" class="sm">biologically coherent layers and tumor-associated regions</text></g></svg>
