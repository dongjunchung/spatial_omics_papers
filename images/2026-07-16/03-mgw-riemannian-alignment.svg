<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#f7f9fd}.p{fill:#fff;stroke:#cad6e8;stroke-width:2}.sp{fill:#f8fbff;stroke:#d5dfef;stroke-width:1.6}.ti{font:700 30px Arial;fill:#12223d}.su{font:600 17px Arial;fill:#41536d}.h{font:700 20px Arial;fill:#16263f}.t{font:14px Arial;fill:#2b3b50}.sm{font:12px Arial;fill:#52637a}.m{font:15px Consolas;fill:#24344f}.a{stroke:#476fba;stroke-width:3;fill:none;marker-end:url(#ar)}.grid{stroke:#d8e2f0;stroke-width:1}.field1{fill:#d7e7ff;stroke:#7fa1dc;stroke-width:2}.field2{fill:#ffe5c4;stroke:#d79441;stroke-width:2}.geo{stroke:#d94f70;stroke-width:4;fill:none}.ot{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}.metric{fill:#fff3e2;stroke:#d49a52;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#476fba"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="60" y="56" class="ti">MGW: Riemannian metric learning for spatial multiomics alignment</text><text x="60" y="86" class="su">Neural fields induce pullback metrics; Riemannian geodesics are aligned by Gromov-Wasserstein optimal transport</text><rect x="55" y="125" width="405" height="760" rx="24" class="p"/><rect x="495" y="125" width="610" height="760" rx="24" class="p"/><rect x="1140" y="125" width="405" height="760" rx="24" class="p"/><text x="90" y="165" class="h">1. Shared tissue base, different modalities</text><text x="90" y="193" class="su">Transcriptome, metabolome, proteome, epigenome...</text><g transform="translate(110 250)"><rect x="0" y="0" width="280" height="230" rx="18" fill="#fff" stroke="#d5dfef"/><g><line x1="35" y1="20" x2="35" y2="210" class="grid"/><line x1="85" y1="20" x2="85" y2="210" class="grid"/><line x1="135" y1="20" x2="135" y2="210" class="grid"/><line x1="185" y1="20" x2="185" y2="210" class="grid"/><line x1="235" y1="20" x2="235" y2="210" class="grid"/><line x1="20" y1="45" x2="260" y2="45" class="grid"/><line x1="20" y1="95" x2="260" y2="95" class="grid"/><line x1="20" y1="145" x2="260" y2="145" class="grid"/><line x1="20" y1="195" x2="260" y2="195" class="grid"/></g><circle cx="75" cy="85" r="13" class="field1"/><circle cx="145" cy="105" r="13" class="field1"/><circle cx="215" cy="150" r="13" class="field1"/><circle cx="90" cy="160" r="13" class="field2"/><circle cx="180" cy="70" r="13" class="field2"/><text x="15" y="270" class="m">points: (s_i, x_i^modality)</text></g><rect x="95" y="620" width="310" height="110" rx="16" class="sp"/><text x="118" y="655" class="m">Problem</text><text x="118" y="685" class="sm">Feature spaces have different dimensions and scales.</text><text x="118" y="710" class="sm">Fixed spatial/feature weights are hard to choose.</text><path d="M465 505C478 505 484 505 495 505" class="a"/><text x="530" y="165" class="h">2. Learn geometry before alignment</text><text x="530" y="193" class="su">Pull modality geometry back to tissue coordinates</text><rect x="535" y="235" width="530" height="260" rx="22" class="sp"/><g transform="translate(565 275)"><rect x="0" y="0" width="220" height="80" rx="16" class="field1"/><text x="22" y="35" class="m">neural field phi_A(s)</text><text x="22" y="60" class="sm">coordinate -> modality A features</text><rect x="285" y="0" width="220" height="80" rx="16" class="field2"/><text x="307" y="35" class="m">neural field phi_B(s)</text><text x="307" y="60" class="sm">coordinate -> modality B features</text><path d="M110 80C120 125 155 145 205 155" class="a"/><path d="M395 80C385 125 350 145 300 155" class="a"/><rect x="120" y="155" width="260" height="78" rx="16" class="metric"/><text x="145" y="190" class="m">pullback metrics</text><text x="145" y="215" class="sm">g_A = J_A^T J_A, g_B = J_B^T J_B</text></g><rect x="535" y="540" width="530" height="250" rx="22" class="sp"/><g transform="translate(565 575)"><path d="M40 150C110 40 210 180 305 80C370 15 435 105 490 50" class="geo"/><text x="40" y="30" class="m">Riemannian geodesic distances</text><text x="40" y="60" class="sm">large penalties for crossing high-gradient biological boundaries</text><rect x="45" y="190" width="410" height="45" rx="12" class="metric"/><text x="70" y="219" class="m">D_A^R, D_B^R from sparse kNN shortest paths</text></g><path d="M1110 505C1122 505 1128 505 1140 505" class="a"/><text x="1175" y="165" class="h">3. Alignment output</text><text x="1175" y="193" class="su">GW coupling across arbitrary modalities</text><g transform="translate(1185 250)"><rect x="0" y="0" width="310" height="130" rx="18" class="ot"/><text x="25" y="40" class="m">Gromov-Wasserstein OT</text><text x="25" y="70" class="sm">coupling pi minimizes metric distortion</text><text x="25" y="96" class="sm">uses Riemannian distances, not raw feature distances</text><rect x="0" y="190" width="310" height="125" rx="18" class="sp"/><text x="25" y="230" class="m">Invariances</text><text x="25" y="260" class="sm">spatial rigid transforms; feature rotations/scaling</text><rect x="0" y="375" width="310" height="125" rx="18" class="sp"/><text x="25" y="415" class="m">Applications</text><text x="25" y="445" class="sm">Stereo-seq embryo, Xenium/Visium CRC,</text><text x="25" y="468" class="sm">metabolomics-transcriptomics kidney/striatum</text></g></svg>
