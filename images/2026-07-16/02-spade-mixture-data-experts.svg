<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#fbfaff}.p{fill:#fff;stroke:#d8d1ef;stroke-width:2}.sp{fill:#f8f6ff;stroke:#ddd8f1;stroke-width:1.6}.ti{font:700 30px Arial;fill:#201b35}.su{font:600 17px Arial;fill:#4b4662}.h{font:700 20px Arial;fill:#241d3b}.t{font:14px Arial;fill:#302b43}.sm{font:12px Arial;fill:#625c77}.m{font:15px Consolas;fill:#2b2543}.a{stroke:#6a5acd;stroke-width:3;fill:none;marker-end:url(#ar)}.he{fill:#f2d3d8;stroke:#be8792;stroke-width:2}.st{fill:#d9e7ff;stroke:#7da3de;stroke-width:2}.exp{fill:#ffd166;stroke:#9a7500;stroke-width:2}.lat{fill:#7b68ee}.out{fill:#b8e0d2;stroke:#5b9d88;stroke-width:2}</style><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6a5acd"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="60" y="56" class="ti">SPADE: ST-informed pathology representation via mixture of data experts</text><text x="60" y="86" class="su">Two-stage clustering creates expert regimes; contrastive learning aligns H&amp;E patch and gene-expression embeddings</text><rect x="55" y="125" width="405" height="760" rx="24" class="p"/><rect x="495" y="125" width="610" height="760" rx="24" class="p"/><rect x="1140" y="125" width="405" height="760" rx="24" class="p"/><text x="90" y="165" class="h">1. Paired pretraining data</text><text x="90" y="193" class="su">HEST-1k style WSI patches and Visium spots</text><g transform="translate(95 250)"><path d="M35 90C102 20 270 30 332 128C392 225 294 345 155 330C55 320-20 195 35 90Z" class="he"/><rect x="74" y="85" width="55" height="55" rx="9" fill="#f8e2e6" stroke="#be8792"/><rect x="145" y="70" width="55" height="55" rx="9" fill="#f8e2e6" stroke="#be8792"/><rect x="220" y="115" width="55" height="55" rx="9" fill="#f8e2e6" stroke="#be8792"/><circle cx="102" cy="112" r="13" class="st"/><circle cx="172" cy="98" r="13" class="st"/><circle cx="248" cy="142" r="13" class="st"/><circle cx="142" cy="205" r="13" class="st"/><circle cx="220" cy="228" r="13" class="st"/></g><rect x="95" y="625" width="315" height="112" rx="16" class="sp"/><text x="118" y="660" class="m">positive pair: h_v patch, h_x gene</text><text x="118" y="690" class="sm">co-registered morphology and molecular profile</text><text x="118" y="716" class="sm">negative pairs are sampled within expert regimes</text><path d="M465 505C478 505 484 505 495 505" class="a"/><text x="530" y="165" class="h">2. Mixture of data experts</text><text x="530" y="193" class="su">Avoid tissue-type shortcuts in a single contrastive model</text><rect x="535" y="235" width="530" height="250" rx="22" class="sp"/><g transform="translate(570 275)"><rect x="0" y="0" width="210" height="75" rx="16" class="exp"/><text x="24" y="34" class="m">within-organ K-means</text><text x="24" y="58" class="sm">fine patch-feature clusters</text><rect x="285" y="0" width="210" height="75" rx="16" class="exp"/><text x="310" y="34" class="m">centroid K-means</text><text x="310" y="58" class="sm">cross-organ expert conditions</text><path d="M210 38C238 38 255 38 285 38" class="a"/><circle cx="55" cy="150" r="22" class="lat"/><circle cx="125" cy="150" r="22" class="lat" opacity=".65"/><circle cx="195" cy="150" r="22" class="lat" opacity=".8"/><text x="245" y="156" class="m">c in expert set C</text></g><rect x="535" y="530" width="530" height="260" rx="22" class="sp"/><g transform="translate(570 570)"><rect x="0" y="0" width="205" height="80" rx="16" fill="#eef4ff" stroke="#9db6e4"/><text x="25" y="34" class="m">image encoder</text><text x="25" y="60" class="sm">H&amp;E patch embedding h_v</text><rect x="295" y="0" width="205" height="80" rx="16" fill="#eef4ff" stroke="#9db6e4"/><text x="322" y="34" class="m">gene encoder</text><text x="322" y="60" class="sm">expression embedding h_x</text><path d="M205 40C235 40 265 40 295 40" class="a"/><text x="80" y="135" class="m">contrastive alignment with similarity-adjusted targets</text><text x="80" y="170" class="sm">pull paired patch/gene embeddings together; use expert-specific hard negatives</text></g><path d="M1110 505C1122 505 1128 505 1140 505" class="a"/><text x="1175" y="165" class="h">3. Downstream pathology tasks</text><text x="1175" y="193" class="su">ST-informed latent slide representations</text><g transform="translate(1185 250)"><rect x="0" y="0" width="310" height="105" rx="18" class="out"/><text x="25" y="38" class="m">cancer classification</text><text x="25" y="66" class="sm">8 tasks reported</text><rect x="0" y="150" width="310" height="105" rx="18" fill="#fff3e6" stroke="#d49a52"/><text x="25" y="188" class="m">survival prediction</text><text x="25" y="216" class="sm">6 tasks reported</text><rect x="0" y="300" width="310" height="105" rx="18" fill="#f7ecff" stroke="#b99bdc"/><text x="25" y="338" class="m">biomarker prediction</text><text x="25" y="366" class="sm">6 tasks reported</text><rect x="0" y="485" width="310" height="105" rx="18" class="sp"/><text x="25" y="523" class="m">key claim</text><text x="25" y="551" class="sm">spatial transcriptomics makes morphology embeddings more molecularly expressive</text></g></svg>
